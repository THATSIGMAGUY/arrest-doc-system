<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ระบบจัดทำเอกสารหลังจับกุม/ควบคุมตัว v1.1-security</title>
<meta name="theme-color" content="#1e40af">
<style>
@import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{--pri:#1e40af;--pri2:#3b82f6;--pri-bg:#eff6ff;--acc:#059669;--acc-bg:#ecfdf5;--wrn:#d97706;--wrn-bg:#fffbeb;--dng:#dc2626;--dng-bg:#fef2f2;--g:#6b7280;--gl:#f3f4f6;--gb:#e5e7eb;--dk:#111827;--w:#fff}
body{font-family:'Sarabun',sans-serif;background:#f0f4f8;color:var(--dk);min-height:100vh}
.app{max-width:1100px;margin:0 auto;padding-bottom:40px}

/* Topbar */
.topbar{background:linear-gradient(135deg,#1e3a8a,#1e40af);padding:14px 24px;display:flex;justify-content:space-between;align-items:center;border-radius:0 0 16px 16px;box-shadow:0 4px 20px rgba(30,64,175,.25)}
.topbar h1{color:#fff;font-size:17px;font-weight:700}
.topbar .ui{display:flex;align-items:center;gap:10px;color:rgba(255,255,255,.8);font-size:13px}

/* Stepper */
.stepper{display:flex;background:var(--w);border-radius:12px;margin:16px;padding:4px;box-shadow:0 1px 4px rgba(0,0,0,.06);overflow-x:auto}
.sbtn{flex:1;padding:10px 4px;border:none;background:none;cursor:pointer;border-radius:10px;font-family:inherit;font-size:12px;color:var(--g);transition:.2s;display:flex;align-items:center;justify-content:center;gap:4px;white-space:nowrap;min-width:0}
.sbtn.active{background:var(--pri-bg);color:var(--pri);font-weight:700}
.sbtn.done{color:var(--acc)}
.sn{width:22px;height:22px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;background:var(--gb);color:var(--w);flex-shrink:0}
.sbtn.active .sn{background:var(--pri)}
.sbtn.done .sn{background:var(--acc)}

/* Content */
.ct{margin:0 16px;background:var(--w);border-radius:16px;box-shadow:0 2px 12px rgba(0,0,0,.06);overflow:hidden}
.ci{padding:24px}
.st{font-size:17px;font-weight:700;color:var(--dk);margin-bottom:4px}
.ss{font-size:13px;color:var(--g);margin-bottom:16px}

/* Form */
.fg{display:grid;gap:12px}
.fg.c2{grid-template-columns:1fr 1fr}
.fg.c3{grid-template-columns:1fr 1fr 1fr}
.fgroup{display:flex;flex-direction:column}
.fgroup.full{grid-column:1/-1}
.fl{font-size:12px;font-weight:600;color:var(--g);margin-bottom:3px}
.fl .req{color:var(--dng)}
input[type=text],input[type=date],input[type=time],input[type=tel],input[type=number],select,textarea{
  padding:9px 12px;border:1.5px solid var(--gb);border-radius:8px;font-family:inherit;font-size:14px;color:var(--dk);transition:.2s;background:var(--w);width:100%;outline:none}
input:focus,select:focus,textarea:focus{border-color:var(--pri);box-shadow:0 0 0 3px rgba(59,130,246,.1)}
textarea{resize:vertical;min-height:70px}

/* Buttons */
.btn{padding:8px 16px;border-radius:8px;font-family:inherit;font-size:13px;font-weight:600;border:none;cursor:pointer;transition:.15s;display:inline-flex;align-items:center;gap:5px}
.btn-p{background:var(--pri);color:var(--w)}.btn-p:hover{background:#1e3a8a}
.btn-o{background:var(--w);color:var(--pri);border:1.5px solid var(--pri)}.btn-o:hover{background:var(--pri-bg)}
.btn-a{background:var(--acc);color:var(--w)}.btn-a:hover{background:#047857}
.btn-d{background:var(--dng-bg);color:var(--dng);border:1px solid #fca5a5}.btn-d:hover{background:#fee2e2}
.btn-s{padding:6px 10px;font-size:11px;border-radius:6px}
.btn-l{padding:12px 32px;font-size:15px;border-radius:10px}

/* Bottom nav */
.bnav{padding:14px 24px;border-top:1px solid var(--gb);display:flex;justify-content:space-between;align-items:center}

/* Cards */
.card{border:1.5px solid var(--gb);border-radius:12px;padding:16px;background:var(--w);margin-bottom:12px}
.card-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}

/* Suspect tabs */
.suspect-tabs{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.suspect-tab{padding:8px 14px;border-radius:8px;border:1.5px solid var(--gb);background:var(--w);font-family:inherit;font-size:13px;cursor:pointer;transition:.15s;font-weight:500}
.suspect-tab.active{background:var(--pri);color:var(--w);border-color:var(--pri);font-weight:700}
.suspect-tab:hover:not(.active){background:var(--pri-bg)}
.suspect-tab.add{border-style:dashed;color:var(--acc)}

/* Info box */
.ib{padding:12px 16px;border-radius:10px;border-left:4px solid;font-size:13px;line-height:1.7;margin-bottom:14px}
.ib.bl{border-color:var(--pri);background:var(--pri-bg);color:var(--pri)}
.ib.gn{border-color:var(--acc);background:var(--acc-bg);color:var(--acc)}
.ib.yl{border-color:var(--wrn);background:var(--wrn-bg);color:#92400e}

/* Photo */
.pgrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.pbox{border:2.5px dashed var(--gb);border-radius:12px;padding:20px 14px;text-align:center;min-height:180px;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--gl);cursor:pointer;transition:.15s}
.pbox:hover{border-color:var(--pri2);background:var(--pri-bg)}
.pbox.has{border-style:solid;border-color:var(--acc);background:var(--w)}
.pbox img{max-width:100%;max-height:120px;border-radius:6px;object-fit:cover;margin-bottom:6px}

/* Rights list */
.rights-list{counter-reset:rights;padding-left:0;list-style:none}
.rights-list li{counter-increment:rights;padding:6px 8px;font-size:13px;line-height:1.6;border-bottom:1px solid var(--gl);display:flex;gap:8px}
.rights-list li::before{content:"(" counter(rights, thai) ")";font-weight:700;color:var(--pri);flex-shrink:0;min-width:24px}

/* Evidence list */
.ev-row{display:grid;grid-template-columns:30px 1fr 120px 60px 40px;gap:8px;align-items:center;margin-bottom:6px;font-size:13px}
.ev-row input{padding:7px 10px;font-size:13px}

/* Preview */
.preview{font-size:13px;line-height:1.8;padding:20px;border:1px solid var(--gb);border-radius:10px;background:var(--w);max-height:500px;overflow-y:auto}
.preview h3{text-align:center;margin-bottom:8px;font-size:15px}
.preview hr{border:none;border-top:1px solid var(--gb);margin:10px 0}
.preview .r{display:flex;gap:6px;margin-bottom:2px}
.preview .rl{color:var(--g);min-width:130px;flex-shrink:0}

/* Badge */
.badge{display:inline-block;padding:2px 10px;border-radius:12px;font-size:11px;font-weight:600}
.badge-g{background:var(--acc-bg);color:var(--acc)}

/* Preview grid */
.pvgrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.pvcard{border:2px solid var(--gb);border-radius:12px;overflow:hidden}
.pvcard-h{padding:12px 14px;display:flex;justify-content:space-between;align-items:center}
.pvcard-b{padding:0 14px 14px}
.pvfield{font-size:12px;margin-bottom:4px;display:flex;gap:4px}
.pvfield .k{color:var(--g);min-width:70px}
.pvfield .v{color:var(--dk);font-weight:500}

/* Sig */
.sig-area{border:2px solid var(--gb);border-radius:12px;background:var(--gl);height:120px;display:flex;align-items:center;justify-content:center;cursor:crosshair;position:relative;overflow:hidden}
.sig-area canvas{position:absolute;top:0;left:0}

/* Export */
.export-sec{text-align:center;margin-top:20px;padding:20px;background:var(--acc-bg);border-radius:12px}

/* Profile */
.prof{display:flex;gap:14px;padding:14px;background:var(--gl);border-radius:10px;margin-bottom:14px;align-items:center}
.prof-av{width:44px;height:44px;border-radius:50%;background:var(--pri);color:var(--w);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}

/* Modal */
.modal-ov{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:1000}
.modal{background:var(--w);border-radius:16px;padding:24px;max-width:700px;width:93%;max-height:88vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}

/* Responsive */
@media(max-width:768px){.fg.c2,.fg.c3,.pgrid,.pvgrid{grid-template-columns:1fr}.ev-row{grid-template-columns:24px 1fr 80px 50px 30px}}

/* Login */
.login-bg{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#1e3a8a 0%,#3b82f6 50%,#059669 100%)}
.login-box{background:#fff;border-radius:20px;padding:40px 36px;width:380px;max-width:92%;box-shadow:0 20px 60px rgba(0,0,0,.3);text-align:center}
.login-box h2{font-size:20px;color:var(--pri);margin-bottom:4px}
.login-box .sub{font-size:13px;color:var(--g);margin-bottom:24px}
.login-box .logo{font-size:48px;margin-bottom:12px}
.login-box input{margin-bottom:12px;width:100%;padding:12px 14px;font-size:15px;border-radius:10px}
.login-box .btn-l{width:100%;padding:12px 14px;font-size:15px;border-radius:10px;box-sizing:border-box}
.login-box .err{color:var(--dng);font-size:13px;margin-bottom:8px;min-height:20px}
.login-box .credit{font-size:11px;color:var(--g);margin-top:20px;border-top:1px solid var(--gb);padding-top:12px}

/* Dashboard */
.dash-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:12px}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.stat-card{background:var(--w);border-radius:14px;padding:18px 20px;box-shadow:0 2px 10px rgba(0,0,0,.05);border-left:4px solid}
.stat-card .num{font-size:32px;font-weight:800;line-height:1}
.stat-card .lbl{font-size:13px;color:var(--g);margin-top:4px}
.dash-toolbar{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.dash-toolbar input[type=text]{max-width:300px}
.dash-toolbar select{max-width:160px}
.case-table{width:100%;border-collapse:separate;border-spacing:0;font-size:13px}
.case-table th{background:var(--gl);padding:10px 12px;text-align:left;font-weight:700;font-size:12px;color:var(--g);text-transform:uppercase;border-bottom:2px solid var(--gb)}
.case-table td{padding:10px 12px;border-bottom:1px solid var(--gl);vertical-align:middle}
.case-table tr:hover td{background:var(--pri-bg)}
.case-table .status{display:inline-block;padding:2px 10px;border-radius:12px;font-size:11px;font-weight:600}
.case-table .status.draft{background:var(--wrn-bg);color:var(--wrn)}
.case-table .status.completed{background:var(--acc-bg);color:var(--acc)}
.case-table .actions{display:flex;gap:6px}
.empty-state{text-align:center;padding:60px 20px;color:var(--g)}
.empty-state .icon{font-size:56px;margin-bottom:12px}
.credit-footer{text-align:center;padding:16px;font-size:12px;color:var(--g);border-top:1px solid var(--gb);margin-top:20px}
.toast{position:fixed;top:20px;right:20px;padding:14px 24px;border-radius:12px;color:#fff;font-size:14px;font-weight:600;z-index:9999;box-shadow:0 4px 20px rgba(0,0,0,.2);animation:slideIn .3s ease}
.toast.success{background:var(--acc)}
.toast.error{background:var(--dng)}
@keyframes slideIn{from{transform:translateX(100px);opacity:0}to{transform:translateX(0);opacity:1}}
@media(max-width:768px){.stat-grid{grid-template-columns:1fr 1fr}.dash-toolbar{flex-direction:column}}
</style>
</head>

<script>
/* --- state.js --- */
// ========== STATE ==========
function newSuspect(n) {

    title: 'นาย', firstName: '', lastName: '', age: '', dob: '',

const S = {

  // Photos
  scenePhoto: null, scenePhotoName: '',

  // Anung (อนึ่ง) - standard text, editable
  anungText: 'ในการจับครั้งนี้ เจ้าหน้าที่ตำรวจทุกนาย ได้ปฏิบัติตามอำนาจหน้าที่ มิได้ทำหรือจัดให้ทำการใดๆ ซึ่งเป็นการให้คำมั่น สัญญา ขู่เข็ญ หลอกลวง ทรมาน ใช้กำลังบังคับ หรือทำให้ผู้ใดได้รับอันตรายแก่กายหรือจิตใจ แต่อย่างใด มิได้ทำให้ทรัพย์สินของผู้ใดเสียหาย สูญหาย เสื่อมค่าหรือไร้ค่า และมิได้เบียดบังเอาทรัพย์สินของผู้ใด ไปเป็นประโยชน์ส่วนตนหรือบุคคลอื่น หรือกระทำการโดยมีชอบประการใดๆ เจ้าหน้าที่ผู้จับได้จัดทำบันทึกการจับขึ้น แล้วได้มอบสำเนาบันทึกการจับให้ผู้ถูกจับไว้ จำนวน ๑ ฉบับแล้ว',
  signatures: {}, // key: 'officer', 'leader_0', 'joint_0_1', 'suspect_0', etc.
  sigActiveKey: 'officer', // which signature pad is active

const STEPS = [
  { l:'ข้อมูลผู้ถูกจับ', i:'👤' },
  { l:'เหตุการณ์', i:'📍' },

<script>
/* --- helpers.js --- */
// ========== HELPERS ==========
function esc(s) { return (s||'').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }
function thDate(d) { if(!d) return ''; const x=new Date(d); const m=['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.']; return `${x.getDate()} ${m[x.getMonth()]} ${x.getFullYear()+543}`; }
function getOT(s) { const m={caught_in_act:'ความผิดซึ่งหน้า',warrant:`หมายจับ ${s.s23_warrantNo||'...'}`,order:`คำสั่ง ${s.s23_orderDetail||'...'}`,other:s.s23_otherDetail||'อื่นๆ'}; return m[s.s23_orderType]||'—'; }

function updS(path, val) {
  const p = path.split('.');
  let o = S;
  for (let i=0;i<p.length-1;i++) o = o[p[i]];
  o[p[p.length-1]] = val;
}

function bindInputs() {
  document.querySelectorAll('[data-f]').forEach(el => {
    el.addEventListener('input', e => updS(e.target.dataset.f, e.target.value));
    el.addEventListener('change', e => updS(e.target.dataset.f, e.target.value));
  });
}

function go(n) { saveAll(); S.step=n; R(); window.scrollTo({top:0,behavior:'smooth'}); }
function next() { saveAll(); if(S.step<STEPS.length-1){S.step++;R();window.scrollTo({top:0,behavior:'smooth'});} }
function prev() { saveAll(); if(S.step>0){S.step--;R();window.scrollTo({top:0,behavior:'smooth'});} }
function saveAll() { document.querySelectorAll('[data-f]').forEach(el => updS(el.dataset.f, el.value)); }

function addSuspect() { S.suspects.push(newSuspect()); S.activeSuspect=S.suspects.length-1; R(); }
function removeSuspect(i) { if(S.suspects.length<=1) return; S.suspects.splice(i,1); S.activeSuspect=Math.min(S.activeSuspect,S.suspects.length-1); R(); }

function addEvidence() { S.evidence.push({name:'',qty:'',unit:'ชิ้น',location:''}); R(); }
function removeEvidence(i) { if(S.evidence.length<=1) return; S.evidence.splice(i,1); R(); }

function editOfficer() {
  const fields = [['rank','ยศ'],['firstName','ชื่อ'],['lastName','นามสกุล'],['position','ตำแหน่ง'],['unit','สังกัด'],['phone','เบอร์โทร']];
  fields.forEach(([k,l]) => { const v=prompt(l+':', S.officer[k]); if(v!==null) S.officer[k]=v; });
  R();
}

// Image compression for photo optimization
function compressImage(dataUrl, maxWidth, quality) {
    return new Promise((resolve) => {
        const img = new Image();
        img.onload = function() {
            const canvas = document.createElement('canvas');
            let w = img.width, h = img.height;
            if (w > maxWidth) { h = h * maxWidth / w; w = maxWidth; }
            canvas.width = w; canvas.height = h;
            canvas.getContext('2d').drawImage(img, 0, 0, w, h);
            resolve(canvas.toDataURL('image/jpeg', quality || 0.7));
        };
        img.src = dataUrl;
    });
}

// Photo
function upPhoto(input, idx, type) {
  const f = input.files[0]; if(!f) return;
  const r = new FileReader();
  r.onload = async function(e) {
    const compressed = await compressImage(e.target.result, 1200, 0.7);
    if(type==='suspect') S.suspects[idx].photo=compressed;
    else if(type==='photoFront') { S.suspects[idx].photoFront=compressed; if(!S.suspects[idx].photo) S.suspects[idx].photo=compressed; }
    else if(type==='photoBack')  S.suspects[idx].photoBack=compressed;
    else if(type==='photoLeft')  S.suspects[idx].photoLeft=compressed;
    else if(type==='photoRight') S.suspects[idx].photoRight=compressed;
    else if(type==='scene') S.scenePhoto=compressed;
    else if(type==='evidence') S.evidencePhoto=compressed;
    R();
  };
  r.readAsDataURL(f);
}
function capCam(id) { const el=document.getElementById(id); el.setAttribute('capture','environment'); el.click(); setTimeout(()=>el.removeAttribute('capture'),100); }

// Signature — key-based (S.signatures[key])
let sigCv, sigCx, sigD=false;
function initSig() {
  sigCv=document.getElementById('sig-cv'); if(!sigCv) return;
  // Set canvas pixel width to match container for full-width drawing
  const container=sigCv.parentElement;
  if(container){sigCv.width=container.clientWidth||600;}
  sigCx=sigCv.getContext('2d');
  const key=S.sigActiveKey;
  if(S.signatures[key]){const img=new Image();img.onload=()=>sigCx.drawImage(img,0,0);img.src=S.signatures[key];}
  sigCv.onmousedown=e=>{sigD=true;sigCx.beginPath();sigCx.moveTo(e.offsetX,e.offsetY);sigCx.strokeStyle='#111';sigCx.lineWidth=2;sigCx.lineCap='round';};
  sigCv.onmousemove=e=>{if(!sigD)return;sigCx.lineTo(e.offsetX,e.offsetY);sigCx.stroke();};
  sigCv.onmouseup=()=>{sigD=false;S.signatures[S.sigActiveKey]=sigCv.toDataURL();};
  sigCv.ontouchstart=e=>{e.preventDefault();const r=sigCv.getBoundingClientRect();const p={offsetX:e.touches[0].clientX-r.left,offsetY:e.touches[0].clientY-r.top};sigD=true;sigCx.beginPath();sigCx.moveTo(p.offsetX,p.offsetY);sigCx.strokeStyle='#111';sigCx.lineWidth=2;sigCx.lineCap='round';};
  sigCv.ontouchmove=e=>{e.preventDefault();if(!sigD)return;const r=sigCv.getBoundingClientRect();sigCx.lineTo(e.touches[0].clientX-r.left,e.touches[0].clientY-r.top);sigCx.stroke();};
  sigCv.ontouchend=()=>{sigD=false;S.signatures[S.sigActiveKey]=sigCv.toDataURL();};
}
function clearSig() { delete S.signatures[S.sigActiveKey]; R(); }

// Preview & Export
function showPv(type, idx) { S.showModal=type; S.modalSuspectIdx=idx||0; saveAll(); R(); }
</script>
<script>
/* --- auth.js --- */
async function doLogin() {
  const username = document.getElementById('login-user').value.trim();
  const password = document.getElementById('login-pass').value;
  if (!username || !password) { S.loginError = 'กรุณากรอกชื่อผู้ใช้และรหัสผ่าน'; R(); return; }

  if (!GAS_URL) {
    // Offline mode — accept any login
    S.currentUser = { username, displayName: username, rank: '', unit: '', role: 'admin' };
    S.view = 'dashboard';
    S.loginError = '';
    S.cases = loadLocalCases();
    R();
    return;
  }

  S.loading = true; S.loginError = ''; R();
  try {
    // Day 3: ส่ง credentials ผ่าน POST body (ไม่ใส่ใน URL เพื่อกัน leak ใน server log/history)
    const data = await gasPost('login', { username, password });
    if (data.success) {
      S.currentUser = data.user;
      S.view = 'dashboard';
      S.loginError = '';
      await loadCases();
    } else {
      S.loginError = data.error || 'ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง';
    }
  } catch(e) {
    console.error('[Login Error]', e);
    S.loginError = 'ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้: ' + e.message;
  }
  S.loading = false; R();
}

function doLogout() {
  S.currentUser = null;
  S.view = 'login';
  S.loginError = '';
  S.currentCaseId = null;
  R();
}

function getFilteredCases() {
  let cases = [...S.cases];
  if (S.dashFilter !== 'all') cases = cases.filter(c => c.status === S.dashFilter);
  if (S.dashSearch) {
    const q = S.dashSearch.toLowerCase();
    cases = cases.filter(c =>
      (c.suspectNames||'').toLowerCase().includes(q) ||
      (c.accusation||'').toLowerCase().includes(q) ||
      (c.location||'').toLowerCase().includes(q)
    );
  }
  // Sort by date descending
  cases.sort((a, b) => new Date(b.createdAt||0) - new Date(a.createdAt||0));
  return cases;
}

function formatDateTime(iso) {
  try {
    const d = new Date(iso);
    const m = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
    return `${d.getDate()} ${m[d.getMonth()]} ${d.getFullYear()+543} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  } catch(e) { return iso; }
}

function buildSigList() {
  const o = S.officer;
  const oName = `${o.rank} ${o.firstName} ${o.lastName}`;
  const list = [];
  // 1. Officer (ผู้จับกุม/บันทึก) — ไม่รวมผู้อำนวยการ
  list.push({ key:'officer', label:'ผู้จับกุม/บันทึก/อ่าน', name:oName, group:'เจ้าหน้าที่ผู้จับกุม', icon:'👮' });
  // 2. Leaders (นำโดย)
  S.leaders.forEach((l,i) => {
    if(l.rankName) list.push({ key:`leader_${i}`, label:'ผู้นำจับกุม', name:l.rankName, group:'นำโดย', icon:'🎖️' });
  });
  // 3. Joint team
  S.jointUnits.forEach((u,ui) => {
    u.officers.forEach((of,oi) => {
      if(of.rankName) list.push({ key:`joint_${ui}_${oi}`, label:'ผู้ร่วมจับกุม', name:of.rankName, group:u.unitName||'หน่วยร่วม', icon:'🤝' });
    });
  });
  // 4. Suspects
  S.suspects.forEach((sus,i) => {
    const fn = `${sus.title}${sus.firstName||'ผู้ต้องหา '+(i+1)} ${sus.lastName}`;

}

function rStep6() {

      </div>

        <div style="font-weight:700;font-size:14px;color:${!isElec?'#92400e':'var(--dk)'}">เว้นช่องลายเซ็น</div>
        <div style="font-size:11px;color:var(--g)">สร้างช่องว่างใน PDF สำหรับเซ็นบนกระดาษ</div>
      </div>

    ${isElec ? rSigElectronic(sigList, signed, total) : rSigBlank(sigList)}
  `;
}

function rSigElectronic(sigList, signed, total) {
  return `
    <!-- Progress -->
    <div style="display:flex;gap:6px;margin-bottom:10px;align-items:center">
      <div style="flex:1;height:8px;background:var(--gl);border-radius:4px;overflow:hidden">
        <div style="height:100%;width:${total?Math.round(signed/total*100):0}%;background:var(--acc);border-radius:4px;transition:.3s"></div>
      </div>
      <span style="font-size:12px;font-weight:700;color:${signed===total?'var(--acc)':'var(--wrn)'}">${signed}/${total} (${total?Math.round(signed/total*100):0}%)</span>
    </div>

    <!-- Signature list -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px">
      ${sigList.map(s => `
        <div onclick="S.sigActiveKey='${s.key}';R()" style="display:flex;gap:10px;align-items:center;padding:10px 12px;border-radius:10px;border:2px solid ${S.sigActiveKey===s.key?'var(--pri)':S.signatures[s.key]?'var(--acc)':'var(--gb)'};background:${S.sigActiveKey===s.key?'var(--pri-bg)':S.signatures[s.key]?'var(--acc-bg)':'var(--w)'};cursor:pointer;transition:.15s">
          <span style="font-size:18px">${s.icon}</span>
          <div style="flex:1;min-width:0">
            <div style="font-size:12px;font-weight:700;color:${S.sigActiveKey===s.key?'var(--pri)':S.signatures[s.key]?'var(--acc)':'var(--dk)'};white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${s.name}</div>
            <div style="font-size:10px;color:var(--g)">${s.label} — ${s.group}</div>
          </div>
          <span style="font-size:16px">${S.signatures[s.key]?'✅':'⬜'}</span>
        </div>
      `).join('')}
    </div>

    <!-- Active signature pad -->
    ${(() => {
      const active = sigList.find(s => s.key === S.sigActiveKey);
      if(!active) return '<div class="ib yl">เลือกรายชื่อด้านบนเพื่อลงลายเซ็น</div>';
      return `
        <div class="card" style="border-top:4px solid var(--pri)">
          <div style="text-align:center;margin-bottom:8px">
            <span style="font-size:22px">${active.icon}</span>
            <div style="font-weight:700;font-size:15px;color:var(--dk)">${active.name}</div>
            <div style="font-size:12px;color:var(--g)">${active.label} — ${active.group}</div>
          </div>
          <div class="sig-area" id="sig-c">
            <canvas id="sig-cv" height="120" style="width:100%;display:block"></canvas>
            ${!S.signatures[S.sigActiveKey]?'<div style="color:var(--g);font-size:14px;pointer-events:none;position:relative;z-index:1">✍️ เซ็นชื่อที่นี่</div>':''}
          </div>
          <div style="text-align:center;margin-top:4px;font-size:12px;color:var(--g)">(${active.name})</div>
          <div style="text-align:center;margin-top:8px">
            <button class="btn btn-o btn-s" onclick="clearSig()">🗑 ล้างลายเซ็น</button>
          </div>
        </div>
      `;
    })()}

    ${signed===total&&total>0?'<div class="ib gn" style="margin-top:12px">✅ ลงลายมือชื่อครบทุกรายแล้ว — กดถัดไปเพื่อ Export เอกสาร</div>':''}
  `;
}

function rSigBlank(sigList) {
  // Group by type
  const officers = sigList.filter(s => !s.key.startsWith('suspect'));
  const suspects = sigList.filter(s => s.key.startsWith('suspect'));

  return `
    <div class="ib yl">📄 ระบบจะสร้าง <strong>ช่องลายเซ็นว่าง</strong> ใน PDF ตามจำนวนคนด้านล่าง — พิมพ์แล้วลงนามบนกระดาษ</div>

      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px">

            <div style="font-size:12px;font-weight:600;color:var(--dk);margin-top:4px">(${s.name})</div>

      <div style="font-weight:700;font-size:14px;color:#92400e;margin-bottom:10px">👤 ผู้ต้องหา (${suspects.length} ช่อง)</div>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px">
        ${suspects.map(s => `
          <div style="border:1.5px dashed var(--gb);border-radius:10px;padding:12px;text-align:center">
            <div style="height:50px;border-bottom:2px solid var(--dk);margin-bottom:6px;display:flex;align-items:flex-end;justify-content:center;color:var(--g);font-size:11px;font-style:italic">ลงชื่อ..................................</div>
            <div style="font-size:12px;font-weight:600;color:var(--dk);margin-top:4px">(${s.name})</div>
            <div style="font-size:10px;color:var(--g)">${s.label}</div>
          </div>
        `).join('')}
      </div>
    </div>

    <div class="ib gn" style="margin-top:8px">✅ ช่องลายเซ็นทั้งหมด ${sigList.length} ช่อง จะถูกสร้างใน PDF — กดถัดไปเพื่อ Export</div>
  `;
}

        ชุดจับกุม: อำนวยการ ${S.commanders.filter(c=>c.rankName).length} นาย | นำโดย ${S.leaders.filter(l=>l.rankName).length} นาย | หน่วยร่วม ${S.jointUnits.filter(u=>u.unitName).length} หน่วยงาน (${S.jointUnits.reduce((a,u)=>a+u.officers.filter(o=>o.rankName).length,0)} นาย)<br>
        ข้อกล่าวหา: ${inc.accusation||'—'}<br>

      </div>
      <div style="display:flex;gap:8px;margin-top:10px;flex-wrap:wrap">

    <button class="btn btn-a btn-l" style="margin-bottom:10px;width:100%" onclick="S.step>=7;saveCurrentCase()">💾 บันทึกคดีนี้ลง${GAS_URL?'ฐานข้อมูล':'เครื่อง'}</button>

      <div style="font-size:13px;color:var(--g);margin-bottom:14px">
        บันทึกจับกุม 1 ฉบับ + ม.22 ${n} ฉบับ + ม.23 ${n} ฉบับ = <strong>${1+n*2} ไฟล์</strong>

      <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">

        <button class="btn btn-a btn-l" onclick="exportAllDoc()">📝 Export Word ทั้งหมด (${1+n*2} ฉบับ)</button>

    </div>
  `;
}

    } else {
      title=`แบบ ม.23 (ปท.1) — ${fn}`;
      body=`<div class="preview">
        <h3 style="font-size:13px">ปท.๑</h3>
        <h3>แบบบันทึกข้อมูลผู้ถูกควบคุมตัวตามมาตรา ๒๓</h3>
        <hr>
        <div><strong>① อัตลักษณ์</strong></div>
        <div class="r"><span class="rl">ชื่อ-สกุล:</span>${fn}</div>
        <div class="r"><span class="rl">เลข ปชช.:</span>${sus.idCard||'...'}</div>
        <div class="r"><span class="rl">ที่อยู่:</span>${sus.addressId||'...'}</div>
        <div class="r"><span class="rl">ตำหนิ:</span>${sus.appearance||'—'}</div>
        <hr>
        <div><strong>② วัน/เวลา/สถานที่ควบคุม</strong></div>
        <div class="r"><span class="rl">วันที่:</span>${ad} เวลา ${at} น.</div>
        <div class="r"><span class="rl">สถานที่:</span>${loc}</div>
        <div class="r"><span class="rl">เจ้าหน้าที่:</span>${oName}</div>
        <div class="r"><span class="rl">ควบคุม ณ:</span>${S.detentionPlace||'...'}</div>
        <hr>
        <div><strong>③ คำสั่ง:</strong> ${getOT(sus)}</div>
        <div><strong>④ ผู้ออกคำสั่ง:</strong> ${sus.s23_orderOfficerName||'...'} ตำแหน่ง ${sus.s23_orderOfficerPosition||'...'}</div>
        <hr>
        <div><strong>⑤ ปล่อยตัว:</strong> ${sus.s23_releaseDate?thDate(sus.s23_releaseDate):'⏳ รอ'} ${sus.s23_releaseTime||''} ผู้รับ: ${sus.s23_receiverName||'—'}</div>
        <hr>
        <div><strong>⑥ สภาพร่างกาย-จิตใจ</strong></div>
        <div class="r"><span class="rl">ก่อนควบคุม:</span>${sus.s23_conditionBefore||'...'}</div>
        <div class="r"><span class="rl">ก่อนปล่อย:</span>${sus.s23_conditionAfter||'⏳'}</div>
        <hr>
        <div><strong>⑧ เหตุสุดวิสัย:</strong> ${sus.s23_forceReason||'—'}</div>
        <div><strong>⑨ เพิ่มเติม:</strong> ${sus.s23_additionalNotes||'—'}</div>
      </div>`;
    }
  }

  return `<div class="modal-ov" onclick="if(event.target===this){S.showModal=null;R()}"><div class="modal">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <h3 style="font-size:15px">${title}</h3>
      <button class="btn btn-s btn-o" onclick="S.showModal=null;R()">✕ ปิด</button>
    </div>
    ${body}
    <div style="text-align:center;margin-top:14px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
      <button class="btn btn-p btn-l" onclick="exportPDF('${t}',${si})">📄 ดาวน์โหลด PDF</button>
      <button class="btn btn-a btn-l" onclick="exportDoc('${t}',${si})">📝 ดาวน์โหลด Word</button>
    </div>
  </div></div>`;
}
</script>
<script>
/* --- documents.js --- */
// ============== HELPERS for official-format documents ==============
function _v(x, fallback) {
  // wrap value in dotted underline span
  const val = (x===null||x===undefined||x==='') ? '' : x;
  return `<span class="d">${val||'\u00a0'.repeat(6)}</span>`;
}
function _vlong(x) {
  const val = (x===null||x===undefined||x==='') ? '\u00a0'.repeat(20) : x;
  return `<span class="d lg">${val}</span>`;
}
function _vmd(x) {
  const val = (x===null||x===undefined||x==='') ? '\u00a0'.repeat(12) : x;
  return `<span class="d md">${val}</span>`;
}
function _photoCellTD(src, label) {
  if (src) {
    return `<td class="photo-td"><img src="${src}" alt="${label}"></td>`;
  }
  return `<td class="photo-td empty-td"><span class="ph-lb-empty">${label}</span><br><span class="ph-no">[ภาพถ่าย]</span></td>`;
}
function _photoGrid2x2(sus) {
  // Table-based 2x2 grid — works in both browser and Word
  return `<table class="photo-tbl" cellspacing="0" cellpadding="0">
    <tr>${_photoCellTD(sus.photoFront||sus.photo,'หน้าตรง')}${_photoCellTD(sus.photoBack,'หันหลัง')}</tr>
    <tr>${_photoCellTD(sus.photoLeft,'หันข้างซ้าย')}${_photoCellTD(sus.photoRight,'หันข้างขวา')}</tr>
  </table>`;
}
function _sigRow3(sigList) {
  // Table-based 3-column signature row — works in Word
  const cells = sigList.map(s => {
    const hasSig = S.signatures[s.key];
    const sigImg = (hasSig && S.sigMode==='electronic') ? `<img src="${S.signatures[s.key]}" style="height:35px">` : '';
    const rankAbbr = s.name ? s.name.split(' ')[0] : '';
    return `<td class="sig-td">
      <div>ลงชื่อ ${rankAbbr?rankAbbr+' ':''} ${sigImg}<span class="sig-dotline"></span></div>
      <div>( ${s.name ? '..'+s.name+'..' : '..........................................'} )</div>
      <div class="sig-role">${s.label}</div>
    </td>`;
  }).join('');
  return `<table class="sig-tbl" cellspacing="0" cellpadding="0"><tr>${cells}</tr></table>`;
}

function buildDocHTML(type, idx) {
  saveAll();
  const o = S.officer, inc = S.incident;
  const oName = `${o.rank} ${o.firstName} ${o.lastName}`;
  const ad = inc.arrestDate ? thDate(inc.arrestDate) : '';
  const at = inc.arrestTime || '';
  const rd = inc.recordDate ? thDate(inc.recordDate) : '';
  const rt = inc.recordTime || '';

  const sigList = buildSigList();

  let title='', body='';

  if (type==='arrest') {
    title='บันทึกจับกุม';

    // Header right block — ชิดขวา เว้นว่างให้กรอกภายหลัง
    const headerRight = `
      <div class="header-fields">
        ลงวันที่${_vlong('')}<br>
        ปจว.ข้อ${_vmd('')}เวลา${_vmd('')}<br>
        คดีอาญาที่${_vlong('')}<br>
        บัญชีของกลางที่${_vmd('')}<br>
        พนักงานสอบสวน${_vmd('')}
      </div>
    `;

    // Thai date parts helper
    function _thDateParts(dateStr) {
      if (!dateStr) return {d:'',m:'',y:''};
      // dateStr could be "12 มกราคม 2569" from thDate()
      const parts = dateStr.split(' ');
      return {d: parts[0]||'', m: parts[1]||'', y: parts[2]||''};
    }
    const rdp = _thDateParts(rd), adp = _thDateParts(ad);

    // Suspects list
    const suspectsHTML = S.suspects.map((s,i)=>{
      const num = ['๑','๒','๓','๔','๕','๖','๗','๘','๙','๑๐'][i] || (i+1);
      const dobParts = s.dob ? thDate(s.dob).split(' ') : ['','',''];
      return `<div style="margin:2px 0">
        ${num}. ${_vlong(`${s.title}${s.firstName} ${s.lastName}`)}อายุ${_v(s.age)}ปี (เกิดเมื่อวันที่${_v(dobParts[0])}/${_v(dobParts[1])}/${_v(dobParts[2])})<br>
        เลขประจำตัวประชาชน${_vlong(s.idCard)}ที่อยู่ตามบัตรประชาชน เลขที่${_vmd(s.addressId)}แขวง/ตำบล${_vmd(s.subDistrict)}<br>
        เขต/อำเภอ${_vmd(s.district)}จังหวัด${_vmd(s.province)}
      </div>`;
    }).join('');

    // Evidence list
    const evidenceHTML = S.evidence.filter(e=>e.name).map((e,i)=>{
      const num = ['๑','๒','๓','๔','๕','๖','๗','๘','๙','๑๐'][i] || (i+1);
      return `<div class="ev-row">${num}. ${_vlong(e.name)}จำนวน${_v(e.qty)}${e.unit||'ชิ้น'}</div>`;
    }).join('');
    // Fill empty rows up to 6
    const emptyEvRows = Math.max(0, 6 - S.evidence.filter(e=>e.name).length);
    const emptyEvHTML = Array(emptyEvRows).fill(0).map((_,i)=>{
      const num = ['๑','๒','๓','๔','๕','๖','๗','๘','๙','๑๐'][S.evidence.filter(e=>e.name).length+i] || '';
      return `<div class="ev-row">${num}. ${_vlong('')}จำนวน${_v('')}ชิ้น</div>`;
    }).join('');

    const totalItems = S.evidence.filter(e=>e.name).length;
    const totalQty = S.evidence.reduce((a,e)=>a+(parseInt(e.qty)||0),0);

    // Commanders & leaders
    const commandersStr = S.commanders.filter(c=>c.rankName).map(c=>c.rankName).join(', ') || '';
    const leadersStr = S.leaders.filter(l=>l.rankName).map(l=>l.rankName).join(', ') || oName;

    // Per-suspect statement
    const statementsHTML = S.suspects.map(s=>{
      const fn = `${s.title}${s.firstName} ${s.lastName}`;
      const stm = s.statement==='confess'?'รับสารภาพ':'ปฏิเสธ';
      return `<div>${fn}: ${_vmd(stm)} ${s.statementDetail?_vlong(s.statementDetail):''}</div>`;
    }).join('');

    // Evidence location
    const evLocationStr = S.evidence.filter(e=>e.name&&e.location).map(e=>e.location).join(', ') || S.evidenceLocation || '';

    // Page 1
    const page1 = `
      <div class="page">
        ${headerRight}
        <div class="clearfix"></div>

        <h1>บันทึกจับกุม</h1>

        <div class="section">
          สถานที่ทำการบันทึก${_vlong(inc.recordPlace||o.unit)}<br>
          วัน / เดือน / ปี ที่บันทึก&emsp;วันที่${_v(rdp.d)}เดือน${_v(rdp.m)}พ.ศ.${_v(rdp.y)} เวลา${_v(rt)}น.<br>
          วัน / เดือน / ปี ที่ตรวจค้น/จับกุม&emsp;วันที่${_v(adp.d)}เดือน${_v(adp.m)}พ.ศ.${_v(adp.y)} เวลา${_v(at)}น.
        </div>

        <div class="section">
          <strong>สถานที่ที่จับกุม</strong> บ้านเลขที่${_vmd(inc.houseNo||inc.location)}ถนน${_vmd(inc.road)}แขวง/ตำบล${_vmd(inc.subDistrict)}<br>
          เขต/อำเภอ${_vmd(inc.district)}จังหวัด${_vmd(inc.province)}
        </div>

        <div class="section">
          <strong>เจ้าหน้าที่ตำรวจที่ทำการจับกุม</strong> ภายใต้การอำนวยการของ${_vlong(commandersStr)}<br>
          นำโดย${_vlong(leadersStr)}
          ${S.jointUnits.some(u=>u.unitName||u.officers.some(of=>of.rankName))?`<br>${_vlong(S.jointUnits.filter(u=>u.unitName).map(u=>u.unitName).join(', '))}`:''}
        </div>

        <div class="section">
          <strong>ได้ร่วมกันจับกุมตัว</strong><br>
          ${suspectsHTML}
        </div>

        <div class="section">
          <strong>พร้อมด้วยของกลาง</strong>
          <div class="ev-list">${evidenceHTML}${emptyEvHTML}</div>
          <div style="text-align:center;font-weight:700;margin-top:4px">
            รวม${_v(totalItems||'')}รายการ จำนวน${_v(totalQty||'')}ชิ้น
          </div>
        </div>

        <div class="section">
          <strong>ตำแหน่งที่พบของกลาง</strong>${_vlong(evLocationStr)}
        </div>

        <div class="section">
          <p class="indent"><strong>โดยกล่าวหาว่า</strong> "${_vlong(inc.accusation)}"</p>
        </div>

        <div class="section">
          <p class="indent"><strong>พฤติการณ์กล่าวคือ</strong></p>
          <p class="indent narrative">${(inc.narrative||'').replace(/\n/g,'<br>') || '<span style="color:#999">[ยังไม่ได้กรอกพฤติการณ์]</span>'}</p>
        </div>
      </div>
    `;

    // Page 2: rights, statement, anung, signatures
    const rightsList = RIGHTS.map((r,i)=>{
      const num = ['๑','๒','๓','๔','๕','๖'][i];
      return `<div>${num}. ${r}</div>`;
    }).join('');

    // Build signature lists
    const officerSigs = sigList.filter(s=>s.key.startsWith('officer')||s.key.startsWith('leader')||s.key.startsWith('joint'));
    const suspectSigs = sigList.filter(s=>s.key.startsWith('suspect'));

    // Suspect signatures — "(ลงชื่อ)...ผู้ต้องหา/ได้รับสำเนาบันทึกการจับไว้แล้ว"
    const suspectSigHTML = suspectSigs.map(s=>`
      <div style="text-align:center;margin:8px 0">
        (ลงชื่อ)${S.signatures[s.key]&&S.sigMode==='electronic'?`<img src="${S.signatures[s.key]}" style="height:30px">`:'<span class="d lg"></span>'}ผู้ต้องหา/ได้รับสำเนาบันทึกการจับไว้แล้ว<br>
        (${_vmd(s.name)})
      </div>
    `).join('');

    // Officer signatures — 2-column table like the example: "ร.ต.อ. ...ผู้จับกุม"
    const officerSigRows = [];
    for(let i=0; i<officerSigs.length; i+=2){
      const s1 = officerSigs[i];
      const s2 = officerSigs[i+1];
      const rank1 = s1.name ? s1.name.split(' ')[0] : '';
      const rank2 = s2 ? (s2.name ? s2.name.split(' ')[0] : '') : '';
      const hasSig1 = S.signatures[s1.key]&&S.sigMode==='electronic';
      const hasSig2 = s2 && S.signatures[s2.key]&&S.sigMode==='electronic';
      const label1 = s1.label||'ผู้จับกุม';
      const label2 = s2 ? (s2.label||'ผู้จับกุม') : '';
      officerSigRows.push(`<tr>
        <td style="text-align:left;padding:6px 0">${rank1} ${hasSig1?`<img src="${S.signatures[s1.key]}" style="height:28px">`:'<span class="d lg"></span>'}${label1}</td>
        ${s2?`<td style="text-align:left;padding:6px 0">${rank2} ${hasSig2?`<img src="${S.signatures[s2.key]}" style="height:28px">`:'<span class="d lg"></span>'}${label2}</td>`:'<td></td>'}
      </tr><tr>
        <td style="text-align:center;padding:0 0 8px">(${_vmd(s1.name)})</td>
        ${s2?`<td style="text-align:center;padding:0 0 8px">(${_vmd(s2.name)})</td>`:'<td></td>'}
      </tr>`);
    }
    const officerSigHTML = `<table style="width:100%;border-collapse:collapse;margin-top:8px">${officerSigRows.join('')}</table>`;

    const page2 = `
      <div class="page">
        <p class="indent">เจ้าหน้าที่ตำรวจชุดจับกุมได้เดินทางไปยังสถานที่ดังกล่าวข้างต้น เมื่อไปถึงได้พบ นาย/นางสาว${_vlong(S.suspects.map(s=>`${s.title}${s.firstName} ${s.lastName}`).join(', '))} อยู่ในที่เกิดเหตุ เจ้าหน้าที่ตำรวจจึงได้แสดงตัวและแสดงบัตรประจำตัวให้ นาย/นางสาว${_vlong(S.suspects.map(s=>`${s.title}${s.firstName} ${s.lastName}`).join(', '))} ทราบและเข้าใจดีแล้ว ผลการตรวจสอบพบของกลางตามรายการดังกล่าวข้างต้น เจ้าหน้าที่ตำรวจจึงได้แจ้งให้ นาย/นางสาว${_vlong(S.suspects.map(s=>`${s.title}${s.firstName} ${s.lastName}`).join(', '))} ทราบว่าการกระทำดังกล่าวเป็นการกระทำความผิดต่อกฎหมาย</p>

        <p class="indent">และแจ้งข้อกล่าวหาให้ทราบว่ากระทำความผิดฐาน "${_vlong(inc.accusation)}" และได้แจ้งสิทธิ์ของผู้ต้องหา ตาม ป.วิอาญา มาตรา ๗/๑ ให้ผู้ต้องหาทราบ ณ สถานที่ตรวจค้น/จับกุม ดังนี้</p>

        <div class="rights-list">${rightsList}</div>

        <div style="margin-top:8px">
          <p class="indent">ขณะจับกุม ผู้ถูกจับ ได้รับทราบข้อกล่าวหา และสิทธิ์ของผู้ถูกจับโดยเข้าใจดีตลอดแล้ว และให้การ ${statementsHTML}</p>
        </div>

        <p class="indent">เจ้าหน้าที่ตำรวจชุดจับกุมจึงได้ร่วมกันทำการจับกุม พร้อมตรวจยึดของกลางตามรายการดังกล่าวข้างต้นเป็นของกลาง นำส่งพนักงานสอบสวน${_vmd(S.detentionPlace||o.unit)}เพื่อดำเนินคดีตามกฎหมายต่อไป</p>

        <div style="margin-top:8px">
          <strong>เหตุเกิดที่</strong>${_vmd(inc.houseNo||inc.location)}แขวง/ตำบล${_vmd(inc.subDistrict)}เขต/อำเภอ${_vmd(inc.district)}จังหวัด${_vmd(inc.province)}<br>
          <strong>เมื่อวันที่</strong>${_vlong(ad)}เวลาประมาณ${_v(at)}น.
        </div>

        <p class="indent" style="margin-top:8px"><strong>อนึ่ง</strong> ${S.anungText}</p>

        <p class="indent">ได้อ่านบันทึกนี้ให้ผู้ต้องหาฟังและได้อ่านเองแล้ว รับว่าถูกต้อง จึงให้ลงลายมือชื่อไว้เป็นหลักฐาน</p>

        ${suspectSigHTML}

        ${officerSigHTML}
      </div>
    `;

    body = page1 + page2;
  }
  else if (type==='sec22') {
    const sus = S.suspects[idx];
    if (!sus) return {title:'',body:''};
    const fn = `${sus.title}${sus.firstName} ${sus.lastName}`;
    title = `แบบ ม.22 — ${fn}`;

    const page1 = `
      <div class="page">
        <h1>แบบแจ้งข้อมูล เรื่อง การจับและควบคุมตามมาตรา ๒๒ วรรคสอง</h1>
        <div class="stars">******************************************************</div>
        <p class="indent">รายการข้อมูลในการแจ้งการจับและควบคุมไปยังศูนย์รับแจ้งโดยทันทีที่มีข้อมูล ดังต่อไปนี้</p>

        <div class="section">
          <span class="section-num">(๑)</span> ชื่อ/สกุล${_vlong(fn)}หมายเลขประจำตัวประชาชนหรือ<br>
          หมายเลขเอกสารอื่นที่ใช้ระบุตัวตน${_vlong(sus.idCard||sus.passport)}<br>
          ที่อยู่${_vlong(sus.addressId)} แขวง/ต.${_vmd(sus.subDistrict)} เขต/อ.${_vmd(sus.district)} จ.${_vmd(sus.province)}<br>
          หมายเลขโทรศัพท์${_vmd(sus.phone)} และอายุ${_v(sus.age)}ปี
        </div>

        <div class="section">
          <span class="section-num">(๒)</span> วัน เวลา และสถานที่ที่ทำการจับและควบคุม<br>
          วันที่${_vmd(ad)}เวลา${_v(at)}น. สถานที่จับและควบคุม${_vlong(inc.location)}<br>
          ตำบล/แขวง${_vmd(inc.subDistrict)} อำเภอ/เขต${_vmd(inc.district)} จังหวัด${_vmd(inc.province)}
        </div>

        <div class="section">
          <span class="section-num">(๓)</span> พฤติการณ์ในการจับและควบคุมบุคคลดังกล่าวโดยย่อ<br>
          <p class="narrative">${(inc.narrative||'').replace(/\n/g,'<br>') || '<span style="color:#999">[ยังไม่ได้กรอกพฤติการณ์]</span>'}</p>
        </div>

        <div class="section">
          <span class="section-num">(๔)</span> สถานที่ที่จะนำตัวบุคคลดังกล่าวไปควบคุมไว้<br>
          สถานที่ควบคุมตัว(สน./สภ./กก.)${_vlong(S.detentionPlace)}<br>
          อำเภอ/เขต${_vmd(S.detentionDistrict)} จังหวัด${_vmd(S.detentionProvince)}
        </div>

        <div class="section">

function getDocCSS(type) {
  // CSS derived from approved prototypes — matches Thai government document standards
  // type = 'arrest' | 'sec22' | 'sec23' — sec23 uses smaller font/tighter padding
  const isSec23 = (type === 'sec23');
  const fontSize = '16px'; // TH SarabunIT๙ ขนาด 16 ทุกเอกสาร
  const lineHeight = isSec23 ? '1.6' : '1.65';
  const padScreen = isSec23 ? '12mm 15mm 10mm 15mm' : '18mm 22mm 15mm 22mm';
  const padPrint = isSec23 ? '10mm 12mm 8mm 12mm' : '15mm 18mm 12mm 18mm';
  const h1Size = isSec23 ? '15px' : '18px';
  const dFontSize = isSec23 ? '13.5px' : fontSize;
  const dMin = isSec23 ? '60px' : '60px';
  const dMd = isSec23 ? '120px' : '130px';
  const dLg = isSec23 ? '180px' : '200px';
  const dXl = isSec23 ? '260px' : '300px';
  const gridFontSize = isSec23 ? '13.5px' : '14px';
  const gridLineHeight = isSec23 ? '1.55' : '1.6';
  const photoHeight = isSec23 ? '165mm' : '195mm';
  const photoMaxWidth = isSec23 ? 'max-width:165mm;margin:10px auto' : 'margin:10px 0';

  return `
      @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap');
      @font-face{font-family:'TH SarabunIT9';src:local('TH SarabunIT๙'),local('TH SarabunIT9'),local('TH Sarabun New'),local('TH SarabunPSK'),local('Sarabun')}
      *{margin:0;padding:0;box-sizing:border-box}
      body{
        font-family:'TH SarabunIT9','TH SarabunIT๙','TH Sarabun New','TH SarabunPSK','Sarabun',sans-serif;
        font-size:${fontSize}; line-height:${lineHeight}; color:#111; background:#e0e0e0;
      }
      .page{
        width:210mm; min-height:297mm;
        margin:20px auto; padding:${padScreen};
        background:#fff; box-shadow:0 2px 8px rgba(0,0,0,.15);
        position:relative; page-break-after:always;
      }
      .page:last-child{page-break-after:auto}
      .page-break{page-break-before:always;height:0;margin:0;padding:0}
      @media print{
        body{background:#fff}
        .page{margin:0;padding:${padPrint};box-shadow:none;width:100%}
        @page{margin:0;size:A4}
      }

      h1{font-size:${h1Size};font-weight:700;text-align:center;margin-bottom:10px;line-height:1.4}
      h2{font-size:18px;font-weight:700;text-align:center;margin-bottom:4px}
      h3{font-size:15px;font-weight:700;margin-bottom:4px}
      strong{font-weight:700}
      img{max-width:100%}

      .stars{text-align:center;font-size:14px;letter-spacing:1px;margin-bottom:6px}
      .indent{text-indent:3em;margin-bottom:4px}
      .narrative{text-indent:3em;white-space:pre-wrap;line-height:1.7}
      .section{margin-bottom:6px}
      .section-num{font-weight:700}
      .section-title{font-weight:700;margin-bottom:2px}
      .clearfix::after{content:'';display:block;clear:both}
      .empty{color:#999}

      /* Dotted underline value field — from prototype */
      .d{
        border-bottom:1px dotted #555;
        display:inline-block;
        min-width:${dMin}; padding:0 3px;
        text-align:center;
        color:#0000cc; font-weight:600;
        font-size:${dFontSize};
      }
      .d:empty::after{content:'\\00a0'}
      .d.md{min-width:${dMd}}
      .d.lg{min-width:${dLg}}
      .d.xlg{min-width:${dXl}}
      .d.full{min-width:calc(100% - 2em);text-align:left;padding-left:6px}

      /* Header right block (arrest record) */
      .header-fields{
        float:right; text-align:right;
        margin-bottom:10px; font-size:14.5px; line-height:1.8;
      }
      .header-fields::after{content:'';display:block;clear:both}

      /* Rights list */
      .rights-list{margin-left:3em}
      .rights-list>div{text-indent:-1.5em;margin-left:1.5em;margin-bottom:2px}

      /* Evidence list */
      .ev-list{margin:4px 0;margin-left:2em}
      .ev-row{margin-bottom:2px}

      /* Signature grid (officer signatures) */
      .sig-grid{
        display:grid;
        grid-template-columns:1fr 1fr;
        gap:12px 20px;
        margin-top:16px;
      }
      .sig-item{text-align:center;font-size:14px}
      .sig-line-2{
        display:inline-block; width:200px;
        border-bottom:1px dotted #555;
        margin-bottom:2px; height:24px;
      }
      .sig-img-inline{height:30px;display:block;margin:0 auto 2px}
      .sig-role{font-size:12px}

      /* Bottom signature area */
      .sig-area{margin-top:30px;text-align:center}
      .sig-area .sig-line{
        display:inline-block; width:250px;
        border-bottom:1px dotted #555; margin-bottom:2px;
      }
      .sig-line{
        display:inline-block; width:200px;
        border-bottom:1px dotted #555; margin-bottom:2px;
      }
      .sig-img{max-height:35px;vertical-align:middle}

      /* Note (footer) */
      .note{
        margin-top:20px; font-size:13px;
        border-top:1px solid #999; padding-top:6px;
      }

      /* Checkbox for sec23 */
      .cb{
        display:inline-block; width:14px; height:14px;
        border:1px solid #333; vertical-align:middle;
        margin-right:4px; text-align:center;
        font-size:11px; line-height:14px;
      }
      .cb.checked::after{
        content:'\\2713'; font-weight:700;
      }

      /* Section 23 form-grid table */
      .form-grid{
        width:100%; border-collapse:collapse;
        margin-top:6px; table-layout:fixed;
      }
      .form-grid td{
        border:1px solid #333; padding:6px 8px;
        vertical-align:top; width:50%;
        font-size:${gridFontSize}; line-height:${gridLineHeight};
      }
      .form-grid .section-title{font-weight:700;margin-bottom:3px}

      /* Page header (sec23) */
      .page-header{
        text-align:right; font-size:13px; margin-bottom:4px;
      }
      .page2-title{
        text-align:center; font-weight:700;
        font-size:16px; margin:8px 0 10px;
      }

      /* Attachment page (photos) */
      .attach-page{page-break-before:always}
      .attach-title{text-align:center;margin-bottom:8px}
      .attach-title .ext{font-size:16px;font-weight:700}
      .attach-title h2{font-size:18px;font-weight:700;margin-top:4px}
      .attach-title .sub{font-size:14px;margin-top:4px}

      /* Photo 2x2 table — Word compatible */
      .photo-tbl{
        width:100%; border-collapse:collapse;
        margin:6px auto;
        ${photoMaxWidth};
      }
      .photo-td{
        width:50%; height:${isSec23?'78mm':'95mm'}; border:1px solid #333;
        text-align:center; vertical-align:middle;
        padding:2px; overflow:hidden;
        background:#f5f5f5;
      }
      .photo-td img{
        max-width:100%; max-height:${isSec23?'76mm':'93mm'}; object-fit:contain;
        display:block; margin:0 auto;
      }
      .empty-td{color:#777;font-size:14px;padding:10px}
      .ph-lb-empty{font-weight:700;color:#333;font-size:16px}
      .ph-no{font-size:12px;color:#888}

      /* 3-column signature table — Word compatible */
      .sig-tbl{
        width:100%; border-collapse:collapse;
        margin-top:12px;
      }
      .sig-td{
        width:33.3%; border:1.5px solid #333;
        text-align:center; padding:10px 8px 8px;
        font-size:14px; line-height:1.7;
        vertical-align:top; min-height:80px;
      }
      .sig-dotline{
        display:inline-block; width:50%;
        border-bottom:1px dotted #555;
        height:20px; margin:0 0 2px;
      }
      .sig-role{font-size:13px;margin-top:2px}
  `;
}

function openPrintWindow(title, body, docType) {
  const w = window.open('','_blank','width=900,height=1000');
  if(!w){alert('กรุณาอนุญาต popup เพื่อ export PDF');return;}
  w.document.write(`<!DOCTYPE html><html lang="th"><head><meta charset="UTF-8">
    <title>${title}</title>
    <style>${getDocCSS(docType)}</style>
  </head><body>${body}
    <script>
    // Wait for fonts and images to load before printing
    window.onload=function(){
      if(document.fonts&&document.fonts.ready){
        document.fonts.ready.then(function(){setTimeout(function(){window.print();},300);});
      } else {
        setTimeout(function(){window.print();},800);
      }
    };
    <\/script>
  </body></html>`);
  w.document.close();
}

function exportPDF(type, idx) {
  const doc = buildDocHTML(type, idx);
  openPrintWindow(doc.title, doc.body, type);
}

// === Word (.doc) export ===
// Generates an HTML file with Word XML headers, downloaded with .doc extension.
// Microsoft Word opens these natively, preserving most styling and pagination.
function exportDoc(type, idx) {
  const doc = buildDocHTML(type, idx);
  downloadDoc(doc.title, doc.body, type);
}

function downloadDoc(title, body, docType) {
  // Word HTML format with Office namespaces & WordSection page setup
  const wordCSS = getDocCSS(docType) + `
    /* Word-specific page setup */
    @page WordSection1 {
      size: 21cm 29.7cm;
      margin: 1.8cm 2cm 1.6cm 2.2cm;
      mso-page-orientation: portrait;
    }
    div.WordSection1 { page: WordSection1; }
    .page { box-shadow: none; margin: 0; padding: 0; width: auto; min-height: auto; background: #fff; page-break-after: auto !important; page-break-before: auto !important; }
    body { background: #fff; font-family: 'TH SarabunIT9','TH SarabunIT๙','TH Sarabun New','Sarabun',sans-serif; font-size: 16px; }
    .photo-tbl { width: 100%; }
    .photo-td { width: 50%; height: 250px; }
    .photo-td img { width: 100%; height: 250px; }
  `;
  const html = `<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:w="urn:schemas-microsoft-com:office:word" xmlns="http://www.w3.org/TR/REC-html40">
<head>
<meta charset="utf-8">
<title>${title}</title>
<!--[if gte mso 9]><xml>
<w:WordDocument><w:View>Print</w:View><w:Zoom>100</w:Zoom><w:DoNotOptimizeForBrowser/></w:WordDocument>
</xml><![endif]-->
<style>${wordCSS}</style>
</head>
<body><div class="WordSection1">${body}</div></body>
</html>`;
  // BOM ensures Word reads UTF-8 (Thai chars) correctly
  const blob = new Blob(['\ufeff', html], { type: 'application/msword' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = (title || 'document').replace(/[\\/:*?"<>|]/g,'_') + '.doc';
  document.body.appendChild(a);
  a.click();
  setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 200);
}

      openPrintWindow(s23.title, s23.body, 'sec23');

    delay += gap;

}

      <div style="width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:14px" onclick="${S.view==='dashboard'?'doLogout()':''}">👤</div>

        <input type="password" id="login-pass" placeholder="รหัสผ่าน (Password)" value="" onkeydown="if(event.key==='Enter')doLogin()">

// ===== SUSPECT TABS =====
function rSuspectTabs() {

<script>
/* --- _api.js --- */
// ========== GAS CALL HELPER ==========

/* gasCall — เรียก Google Apps Script
   ถ้ารันใน GAS HtmlService → ใช้ google.script.run (ไม่มี CORS)
   ถ้ารันจาก file:// หรือ server อื่น → ใช้ fetch */
async function gasCall(url, opts = {}) {
  // --- Mode 1: google.script.run (เมื่อ host บน GAS) ---
  if (typeof google !== 'undefined' && google.script && google.script.run) {
    // แยก action และ params จาก URL / body — body ชนะ URL ถ้ามี
    const u = new URL(url, 'https://x.com');
    let action = u.searchParams.get('action');
    const params = {};
    u.searchParams.forEach((v, k) => { if (k !== 'action') params[k] = v; });
    if (opts.body) {
      try {
        const bodyData = JSON.parse(opts.body);
        if (bodyData.action) action = bodyData.action;
        Object.assign(params, bodyData);
      } catch(e) {}
    }

    return new Promise((resolve, reject) => {
      google.script.run
        .withSuccessHandler(r => { console.log('[GAS] script.run OK:', r); resolve(r); })
        .withFailureHandler(e => reject(new Error(e.message || 'Server error')))
        .gasApi(action, params);
    });
  }

  // --- Mode 2: fetch (เมื่อ host บน server อื่นหรือ localhost) ---
  const res = await fetch(url, { redirect: 'follow', ...opts });
  const text = await res.text();
  try { return JSON.parse(text); }
  catch(pe) { throw new Error('Response ไม่ใช่ JSON: ' + text.substring(0, 80)); }
}

// ขนาดเล็กๆ เรียกง่ายขึ้น — ทุก action ส่งเป็น POST + JSON body
function gasPost(action, payload = {}) {
  return gasCall(GAS_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify({ action, ...payload })
  });
}

// ========== GOOGLE SHEETS & DATA ==========

async function loadCases() {
  if (!GAS_URL) { S.cases = loadLocalCases(); R(); return; }
  S.loading = true; R();
  try {
    // Day 4: ส่ง requester เพื่อให้ backend filter ตามเจ้าของ (admin เห็นทั้งหมด)
    const data = await gasPost('listCases', { requester: S.currentUser?.username || '' });
    if (data.success) S.cases = data.cases || [];
    else showToast(data.error || 'โหลดข้อมูลล้มเหลว', 'error');
  } catch(e) { showToast('เชื่อมต่อเซิร์ฟเวอร์ไม่ได้: ' + e.message, 'error'); }
  S.loading = false; R();
}

async function saveCurrentCase() {
  saveAll(); // sync form inputs to S

  const suspectNames = S.suspects.map(s => `${s.title}${s.firstName} ${s.lastName}`.trim()).filter(n=>n).join(', ');
  const accusation = S.incident.accusation || '';
  const location = `${S.incident.subDistrict||''} ${S.incident.district||''} ${S.incident.province||''}`.trim();
  const status = S.step >= 7 ? 'completed' : 'draft';

  // Build caseData — the full S object minus UI fields
  const caseData = {};
  const skipKeys = ['view','currentUser','cases','currentCaseId','dashSearch','dashFilter','loginError','loading','showModal','modalSuspectIdx'];
  for (const k of Object.keys(S)) {
    if (!skipKeys.includes(k)) caseData[k] = S[k];
  }

  if (!GAS_URL) {
    // Offline mode — save to localStorage
    if (!S.currentCaseId) S.currentCaseId = 'CASE_' + Date.now();
    const localCases = JSON.parse(localStorage.getItem('arrestCases') || '[]');
    const idx = localCases.findIndex(c => c.caseId === S.currentCaseId);
    const entry = {
      caseId: S.currentCaseId,
      createdBy: S.currentUser?.username || 'offline',
      createdAt: idx >= 0 ? localCases[idx].createdAt : new Date().toISOString(),
      updatedAt: new Date().toISOString(),
      status, suspectNames, accusation, location,
      caseData: JSON.stringify(caseData)
    };
    if (idx >= 0) localCases[idx] = entry;
    else localCases.push(entry);
    localStorage.setItem('arrestCases', JSON.stringify(localCases));
    S.cases = localCases.map(c => ({...c, caseData: undefined}));
    showToast('💾 บันทึกสำเร็จ (Offline)', 'success');
    R();
    return;
  }

  S.loading = true;
  showToast('💾 กำลังบันทึก...', 'success');
  try {
    // Day 4: ส่ง requester (backend เช็ค ownership) + ส่ง caseData เป็น object (backend stringify เอง)
    const data = await gasPost('saveCase', {
      caseId: S.currentCaseId,
      requester: S.currentUser?.username || '',
      caseData,
      suspectNames, accusation, location, status
    });
    if (data.success) {
      S.currentCaseId = data.caseId;
      showToast('✅ บันทึกสำเร็จ', 'success');
      await loadCases();
    } else {
      showToast(data.error || 'บันทึกล้มเหลว', 'error');
    }
  } catch(e) { showToast('บันทึกไม่ได้: ' + e.message, 'error'); }
  S.loading = false; R();
}

async function openCase(caseId) {
  if (!GAS_URL) {
    // Offline mode
    const localCases = JSON.parse(localStorage.getItem('arrestCases') || '[]');
    const c = localCases.find(x => x.caseId === caseId);
    if (c && c.caseData) {
      const cd = JSON.parse(c.caseData);
      Object.assign(S, cd);
      S.currentCaseId = caseId;
      S.view = 'form';
      R();
    }
    return;
  }

  S.loading = true; R();
  try {
    // Day 4: getCase ต้องส่ง requester + backend return shape ใหม่เป็น flat (caseData อยู่ top-level)
    const data = await gasPost('getCase', {
      caseId,
      requester: S.currentUser?.username || ''
    });
    if (data.success && data.caseData) {
      const cd = typeof data.caseData === 'string' ? JSON.parse(data.caseData) : data.caseData;
      Object.assign(S, cd);
      S.currentCaseId = caseId;
      S.view = 'form';
    } else {
      showToast(data.error || 'โหลดข้อมูลคดีล้มเหลว', 'error');
    }
  } catch(e) { showToast('โหลดคดีไม่ได้: ' + e.message, 'error'); }
  S.loading = false; R();
}

async function confirmDeleteCase(caseId) {
  if (!confirm('ยืนยันการลบรายการคดีนี้?')) return;

  if (!GAS_URL) {
    let localCases = JSON.parse(localStorage.getItem('arrestCases') || '[]');
    localCases = localCases.filter(c => c.caseId !== caseId);
    localStorage.setItem('arrestCases', JSON.stringify(localCases));
    S.cases = localCases.map(c => ({...c, caseData: undefined}));
    showToast('🗑 ลบสำเร็จ', 'success');
    R();
    return;
  }

  try {
    // Day 4: deleteCase ต้องส่ง requester (backend เช็คว่าเป็นเจ้าของหรือ admin)
    const data = await gasPost('deleteCase', {
      caseId,
      requester: S.currentUser?.username || ''
    });
    if (data.success) {
      showToast('🗑 ลบสำเร็จ', 'success');
      await loadCases();
    } else { showToast(data.error || 'ลบล้มเหลว', 'error'); }
  } catch(e) { showToast('ลบไม่ได้: ' + e.message, 'error'); }
}

function newCase() {
  // Reset form state to defaults
  const defaults = {
    step: 0,
    activeSuspect: 0,
    showModal: null,
    modalSuspectIdx: 0,
    officer: { rank:'', firstName:'', lastName:'', position:'', unit:'', phone:'' },
    commanders: [{ rankName:'' }],
    leaders: [{ rankName:'' }],
    jointUnits: [{ unitName:'', officers:[{ rankName:'' }] }],
    suspects: [newSuspect(1)],
    incident: { recordPlace:'', recordDate:'', recordTime:'', arrestDate:'', arrestTime:'', location:'', houseNo:'', road:'', subDistrict:'', district:'', province:'', narrative:'', accusation:'', charges:'' },
    evidence: [{ name:'', qty:'', unit:'ชิ้น', location:'' }],
    evidenceLocation: '',
    detentionPlace: '', detentionDistrict: '', detentionProvince: '',
    scenePhoto: null, scenePhotoName: '',
    evidencePhoto: null, evidencePhotoName: '',
    anungText: 'ในการจับครั้งนี้ เจ้าหน้าที่ตำรวจทุกนาย ได้ปฏิบัติตามอำนาจหน้าที่ มิได้ทำหรือจัดให้ทำการใดๆ ซึ่งเป็นการให้คำมั่น สัญญา ขู่เข็ญ หลอกลวง ทรมาน ใช้กำลังบังคับ หรือทำให้ผู้ใดได้รับอันตรายแก่กายหรือจิตใจ แต่อย่างใด มิได้ทำให้ทรัพย์สินของผู้ใดเสียหาย สูญหาย เสื่อมค่าหรือไร้ค่า และมิได้เบียดบังเอาทรัพย์สินของผู้ใด ไปเป็นประโยชน์ส่วนตนหรือบุคคลอื่น หรือกระทำการโดยมีชอบประการใดๆ เจ้าหน้าที่ผู้จับได้จัดทำบันทึกการจับขึ้น แล้วได้มอบสำเนาบันทึกการจับให้ผู้ถูกจับไว้ จำนวน ๑ ฉบับแล้ว',
    signatures: {},
    sigActiveKey: 'officer',
    sigMode: 'electronic',
  };

  Object.assign(S, defaults);
  S.currentCaseId = null;
  S.view = 'form';
  R();
}

function backToDashboard() {
  if (confirm('กลับไปหน้า Dashboard?\n(ข้อมูลที่ยังไม่ได้บันทึกจะหายไป — กดบันทึกก่อนหากต้องการเก็บข้อมูล)')) {
    S.view = 'dashboard';
    R();
  }
}

function loadLocalCases() {
  try {
    const cases = JSON.parse(localStorage.getItem('arrestCases') || '[]');
    return cases.map(c => ({ caseId: c.caseId, createdBy: c.createdBy, createdAt: c.createdAt, updatedAt: c.updatedAt, status: c.status, suspectNames: c.suspectNames, accusation: c.accusation, location: c.location }));
  } catch(e) { return []; }
}

function showToast(msg, type) {
  const existing = document.querySelector('.toast');
  if (existing) existing.remove();
  const t = document.createElement('div');
  t.className = `toast ${type||'success'}`;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}
</script>
