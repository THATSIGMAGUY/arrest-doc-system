<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ระบบจัดทำเอกสารหลังจับกุม/ควบคุมตัว v2</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{--pri:#1e40af;--pri2:#3b82f6;--pri-bg:#eff6ff;--acc:#059669;--acc-bg:#ecfdf5;--wrn:#d97706;--wrn-bg:#fffbeb;--dng:#dc2626;--dng-bg:#fef2f2;--g:#6b7280;--gl:#f3f4f6;--gb:#e5e7eb;--dk:#111827;--w:#fff}
body{font-family:'Sarabun',sans-serif;background:#f0f4f8;color:var(--dk);min-height:100vh}
.app{max-width:1100px;margin:0 auto;padding-bottom:40px}

/* Topbar */
.topbar{background:linear-gradient(135deg,#1e3a8a,#1e40af);padding:14px 24px;display:flex;justify-content:space-between;align-items:center;border-radius:0 0 16px 16px;box-shadow:0 4px 20px rgba(30,64,175,.25)}
.topbar h1{color:#fff;font-size:17px;font-weight:700}
.topbar .ui{display:flex;align-items:center;gap:10px;color:rgba(255,255,255,.8);font-size:13px}

/* Stepper */
.stepper{display:flex;background:var(--w);border-radius:12px;margin:16px;padding:4px;box-shadow:0 1px 4px rgba(0,0,0,.06);overflow-x:auto}
.sbtn{flex:1;padding:10px 4px;border:none;background:none;cursor:pointer;border-radius:10px;font-family:inherit;font-size:12px;color:var(--g);transition:.2s;display:flex;align-items:center;justify-content:center;gap:4px;white-space:nowrap;min-width:0}
.sbtn.active{background:var(--pri-bg);color:var(--pri);font-weight:700}
.sbtn.done{color:var(--acc)}
.sn{width:22px;height:22px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;background:var(--gb);color:var(--w);flex-shrink:0}
.sbtn.active .sn{background:var(--pri)}
.sbtn.done .sn{background:var(--acc)}

/* Content */
.ct{margin:0 16px;background:var(--w);border-radius:16px;box-shadow:0 2px 12px rgba(0,0,0,.06);overflow:hidden}
.ci{padding:24px}
.st{font-size:17px;font-weight:700;color:var(--dk);margin-bottom:4px}
.ss{font-size:13px;color:var(--g);margin-bottom:16px}

/* Form */
.fg{display:grid;gap:12px}
.fg.c2{grid-template-columns:1fr 1fr}
.fg.c3{grid-template-columns:1fr 1fr 1fr}
.fgroup{display:flex;flex-direction:column}
.fgroup.full{grid-column:1/-1}
.fl{font-size:12px;font-weight:600;color:var(--g);margin-bottom:3px}
.fl .req{color:var(--dng)}
input[type=text],input[type=date],input[type=time],input[type=tel],input[type=number],select,textarea{
  padding:9px 12px;border:1.5px solid var(--gb);border-radius:8px;font-family:inherit;font-size:14px;color:var(--dk);transition:.2s;background:var(--w);width:100%;outline:none}
input:focus,select:focus,textarea:focus{border-color:var(--pri);box-shadow:0 0 0 3px rgba(59,130,246,.1)}
textarea{resize:vertical;min-height:70px}

/* Buttons */
.btn{padding:8px 16px;border-radius:8px;font-family:inherit;font-size:13px;font-weight:600;border:none;cursor:pointer;transition:.15s;display:inline-flex;align-items:center;gap:5px}
.btn-p{background:var(--pri);color:var(--w)}.btn-p:hover{background:#1e3a8a}
.btn-o{background:var(--w);color:var(--pri);border:1.5px solid var(--pri)}.btn-o:hover{background:var(--pri-bg)}
.btn-a{background:var(--acc);color:var(--w)}.btn-a:hover{background:#047857}
.btn-d{background:var(--dng-bg);color:var(--dng);border:1px solid #fca5a5}.btn-d:hover{background:#fee2e2}
.btn-s{padding:6px 10px;font-size:11px;border-radius:6px}
.btn-l{padding:12px 32px;font-size:15px;border-radius:10px}

/* Bottom nav */
.bnav{padding:14px 24px;border-top:1px solid var(--gb);display:flex;justify-content:space-between;align-items:center}

/* Cards */
.card{border:1.5px solid var(--gb);border-radius:12px;padding:16px;background:var(--w);margin-bottom:12px}
.card-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}

/* Suspect tabs */
.suspect-tabs{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.suspect-tab{padding:8px 14px;border-radius:8px;border:1.5px solid var(--gb);background:var(--w);font-family:inherit;font-size:13px;cursor:pointer;transition:.15s;font-weight:500}
.suspect-tab.active{background:var(--pri);color:var(--w);border-color:var(--pri);font-weight:700}
.suspect-tab:hover:not(.active){background:var(--pri-bg)}
.suspect-tab.add{border-style:dashed;color:var(--acc)}

/* Info box */
.ib{padding:12px 16px;border-radius:10px;border-left:4px solid;font-size:13px;line-height:1.7;margin-bottom:14px}
.ib.bl{border-color:var(--pri);background:var(--pri-bg);color:var(--pri)}
.ib.gn{border-color:var(--acc);background:var(--acc-bg);color:var(--acc)}
.ib.yl{border-color:var(--wrn);background:var(--wrn-bg);color:#92400e}

/* Photo */
.pgrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.pbox{border:2.5px dashed var(--gb);border-radius:12px;padding:20px 14px;text-align:center;min-height:180px;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--gl);cursor:pointer;transition:.15s}
.pbox:hover{border-color:var(--pri2);background:var(--pri-bg)}
.pbox.has{border-style:solid;border-color:var(--acc);background:var(--w)}
.pbox img{max-width:100%;max-height:120px;border-radius:6px;object-fit:cover;margin-bottom:6px}

/* Rights list */
.rights-list{counter-reset:rights;padding-left:0;list-style:none}
.rights-list li{counter-increment:rights;padding:6px 8px;font-size:13px;line-height:1.6;border-bottom:1px solid var(--gl);display:flex;gap:8px}
.rights-list li::before{content:"(" counter(rights, thai) ")";font-weight:700;color:var(--pri);flex-shrink:0;min-width:24px}

/* Evidence list */
.ev-row{display:grid;grid-template-columns:30px 1fr 120px 60px 40px;gap:8px;align-items:center;margin-bottom:6px;font-size:13px}
.ev-row input{padding:7px 10px;font-size:13px}

/* Preview */
.preview{font-size:13px;line-height:1.8;padding:20px;border:1px solid var(--gb);border-radius:10px;background:var(--w);max-height:500px;overflow-y:auto}
.preview h3{text-align:center;margin-bottom:8px;font-size:15px}
.preview hr{border:none;border-top:1px solid var(--gb);margin:10px 0}
.preview .r{display:flex;gap:6px;margin-bottom:2px}
.preview .rl{color:var(--g);min-width:130px;flex-shrink:0}

/* Badge */
.badge{display:inline-block;padding:2px 10px;border-radius:12px;font-size:11px;font-weight:600}
.badge-g{background:var(--acc-bg);color:var(--acc)}

/* Preview grid */
.pvgrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.pvcard{border:2px solid var(--gb);border-radius:12px;overflow:hidden}
.pvcard-h{padding:12px 14px;display:flex;justify-content:space-between;align-items:center}
.pvcard-b{padding:0 14px 14px}
.pvfield{font-size:12px;margin-bottom:4px;display:flex;gap:4px}
.pvfield .k{color:var(--g);min-width:70px}
.pvfield .v{color:var(--dk);font-weight:500}

/* Sig */
.sig-area{border:2px solid var(--gb);border-radius:12px;background:var(--gl);height:120px;display:flex;align-items:center;justify-content:center;cursor:crosshair;position:relative;overflow:hidden}
.sig-area canvas{position:absolute;top:0;left:0}

/* Export */
.export-sec{text-align:center;margin-top:20px;padding:20px;background:var(--acc-bg);border-radius:12px}

/* Profile */
.prof{display:flex;gap:14px;padding:14px;background:var(--gl);border-radius:10px;margin-bottom:14px;align-items:center}
.prof-av{width:44px;height:44px;border-radius:50%;background:var(--pri);color:var(--w);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}

/* Modal */
.modal-ov{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:1000}
.modal{background:var(--w);border-radius:16px;padding:24px;max-width:700px;width:93%;max-height:88vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}

/* Responsive */
@media(max-width:768px){.fg.c2,.fg.c3,.pgrid,.pvgrid{grid-template-columns:1fr}.ev-row{grid-template-columns:24px 1fr 80px 50px 30px}}
</style>
</head>
<body>
<div class="app" id="app"></div>
<script>
// ========== STATE ==========
function newSuspect(n) {
  return {
    id: Date.now() + Math.random(),
    title: 'นาย', firstName: '', lastName: '', age: '', dob: '',
    idCard: '', passport: '', phone: '', address: '', addressId: '',
    subDistrict: '', district: '', province: '',
    appearance: '', photo: null, photoName: '',
    photoFront: null, photoBack: null, photoLeft: null, photoRight: null,
    // per-suspect for arrest record
    statement: 'confess', // confess | deny
    statementDetail: '',
    // per-suspect for sec23
    s23_orderType: 'caught_in_act',
    s23_warrantNo: '', s23_courtName: '', s23_orderDetail: '', s23_otherDetail: '',
    s23_orderOfficerName: '', s23_orderOfficerPosition: '',
    s23_conditionBefore: '', s23_conditionAfter: '',
    s23_releaseDate: '', s23_releaseTime: '', s23_releasePlace: '',
    s23_receiverName: '', s23_receiverPhone: '',
    s23_forceReason: '', s23_additionalNotes: '',
  };
}

const S = {
  step: 0,
  activeSuspect: 0,
  showModal: null,
  modalSuspectIdx: 0,
  officer: { rank:'ร.ต.อ.', firstName:'สมชาย', lastName:'รักดี', position:'รอง สว.(สอบสวน)', unit:'สภ.บางบัวทอง', phone:'081-234-5678' },
  // Team - 3 sections, each can have multiple officers
  commanders: [{ rankName:'' }],    // ภายใต้การอำนวยการของ
  leaders: [{ rankName:'' }],        // นำโดย
  jointUnits: [{ unitName:'', officers:[{ rankName:'' }] }], // หน่วยงานร่วมจับกุม
  suspects: [newSuspect(1)],
  incident: {
    recordPlace: '', recordDate: '', recordTime: '',
    arrestDate: '', arrestTime: '',
    location: '', houseNo: '', road: '', subDistrict: '', district: '', province: '',
    narrative: '',
    accusation: '', // โดยกล่าวหาว่า
    charges: '', // ข้อหา
  },
  evidence: [{ name:'', qty:'', unit:'ชิ้น', location:'' }],
  evidenceLocation: '', // ตำแหน่งที่พบของกลาง
  // Shared
  detentionPlace: '', detentionDistrict: '', detentionProvince: '',
  // Photos
  scenePhoto: null, scenePhotoName: '',
  evidencePhoto: null, evidencePhotoName: '',
  // Anung (อนึ่ง) - standard text, editable
  anungText: 'ในการจับครั้งนี้ เจ้าหน้าที่ตำรวจทุกนาย ได้ปฏิบัติตามอำนาจหน้าที่ มิได้ทำหรือจัดให้ทำการใดๆ ซึ่งเป็นการให้คำมั่น สัญญา ขู่เข็ญ หลอกลวง ทรมาน ใช้กำลังบังคับ หรือทำให้ผู้ใดได้รับอันตรายแก่กายหรือจิตใจ แต่อย่างใด มิได้ทำให้ทรัพย์สินของผู้ใดเสียหาย สูญหาย เสื่อมค่าหรือไร้ค่า และมิได้เบียดบังเอาทรัพย์สินของผู้ใด ไปเป็นประโยชน์ส่วนตนหรือบุคคลอื่น หรือกระทำการโดยมีชอบประการใดๆ เจ้าหน้าที่ผู้จับได้จัดทำบันทึกการจับขึ้น แล้วได้มอบสำเนาบันทึกการจับให้ผู้ถูกจับไว้ จำนวน ๑ ฉบับแล้ว',
  signatures: {}, // key: 'officer', 'leader_0', 'joint_0_1', 'suspect_0', etc.
  sigActiveKey: 'officer', // which signature pad is active
  sigMode: 'electronic', // 'electronic' = เซ็นบนจอ, 'blank' = เว้นช่องว่างไว้ลงนามบนกระดาษ
};

const RIGHTS = [
  'มีสิทธิ์แจ้งหรือขอให้เจ้าพนักงานให้ญาติหรือผู้ซึ่งตนไว้วางใจทราบถึงการจับกุมและสถานที่ที่ถูกควบคุมในโอกาสแรกที่สามารถดำเนินการได้โดยสะดวก',
  'มีสิทธิ์ที่จะพบและปรึกษาทนายความ หรือผู้ซึ่งจะเป็นทนายความเป็นการเฉพาะตัว',
  'มีสิทธิ์ให้ทนายความหรือผู้ที่ตนไว้วางใจเข้าฟังการสอบปากคำตนได้ในชั้นสอบสวน',
  'มีสิทธิ์ได้รับการเยี่ยมหรือติดต่อกับญาติได้ตามสมควร',
  'มีสิทธิ์ได้รับการรักษาพยาบาลโดยเร็วเมื่อเกิดการเจ็บป่วย',
  'มีสิทธิ์ที่จะให้การหรือไม่ให้การก็ได้ และถ้อยคำของผู้ถูกจับนั้น อาจใช้เป็นพยานหลักฐานในการพิจารณาคดีได้',
];

const STEPS = [
  { l:'ข้อมูลผู้ถูกจับ', i:'👤' },
  { l:'เหตุการณ์', i:'📍' },
  { l:'ของกลาง', i:'📦' },
  { l:'ข้อกล่าวหา & สิทธิ', i:'⚖️' },
  { l:'รูปภาพ', i:'📸' },
  { l:'ข้อมูล ม.23', i:'📝' },
  { l:'ลงนาม', i:'✍️' },
  { l:'Export', i:'✅' },
];

// ========== RENDER ==========
function R() {
  document.getElementById('app').innerHTML = `
    ${rTopbar()}${rStepper()}
    <div class="ct"><div class="ci">${rStep()}</div>${rNav()}</div>
    ${S.showModal ? rModal() : ''}
  `;
  bindInputs();
  if (S.step === 6) initSig();
}

function rTopbar() {
  const o = S.officer;
  return `<div class="topbar"><h1>⚖️ ระบบจัดทำเอกสารหลังจับกุม/ควบคุมตัว</h1><div class="ui"><span>${o.rank} ${o.firstName} ${o.lastName}</span><div style="width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:14px">👤</div></div></div>`;
}

function rStepper() {
  return `<div class="stepper">${STEPS.map((s,i) => `<button class="sbtn ${i===S.step?'active':''} ${i<S.step?'done':''}" onclick="go(${i})"><span class="sn">${i<S.step?'✓':i+1}</span><span>${s.i} ${s.l}</span></button>`).join('')}</div>`;
}

function rNav() {
  return `<div class="bnav"><button class="btn btn-o" onclick="prev()" ${S.step===0?'disabled style="opacity:.4;pointer-events:none"':''}>← ย้อนกลับ</button><span style="font-size:12px;color:var(--g)">ขั้นตอน ${S.step+1}/${STEPS.length}</span><button class="btn btn-p" onclick="next()">${S.step===STEPS.length-1?'✅ เสร็จสิ้น':'ถัดไป →'}</button></div>`;
}

// ===== SUSPECT TABS =====
function rSuspectTabs() {
  return `<div class="suspect-tabs">${S.suspects.map((s,i) => `<button class="suspect-tab ${i===S.activeSuspect?'active':''}" onclick="S.activeSuspect=${i};R()">👤 ผู้ต้องหาที่ ${i+1}${s.firstName?' — '+s.firstName:''}</button>`).join('')}<button class="suspect-tab add" onclick="addSuspect()">➕ เพิ่มผู้ต้องหา</button></div>`;
}

// ========== STEP 0: SUSPECTS ==========
function rStep() {
  switch(S.step) {
    case 0: return rStep0();
    case 1: return rStep1();
    case 2: return rStep2();
    case 3: return rStep3();
    case 4: return rStep4();
    case 5: return rStep5();
    case 6: return rStep6();
    case 7: return rStep7();
  }
}

function rStep0() {
  const sus = S.suspects[S.activeSuspect];
  if (!sus) { S.activeSuspect = 0; return rStep0(); }
  return `
    <div class="st">ข้อมูลเจ้าหน้าที่ผู้จับกุม</div>
    <div class="ss">ข้อมูลจาก profile — แก้ไขได้</div>
    <div class="prof">
      <div class="prof-av">👮</div>
      <div style="flex:1;font-size:13px;line-height:1.8">
        <strong>${S.officer.rank} ${S.officer.firstName} ${S.officer.lastName}</strong><br>
        ${S.officer.position} | ${S.officer.unit} | โทร: ${S.officer.phone}
        <br><button class="btn btn-s btn-o" onclick="editOfficer()">✏️ แก้ไข</button>
      </div>
    </div>

    <div class="st" style="margin-top:16px">ข้อมูลผู้ถูกจับกุม / ควบคุมตัว</div>
    <div class="ss">เพิ่มผู้ต้องหาได้หลายราย — ม.22 และ ม.23 จะสร้างเอกสาร 1 ชุดต่อ 1 ราย</div>
    ${rSuspectTabs()}

    ${S.suspects.length > 1 ? `<div style="text-align:right;margin-bottom:8px"><button class="btn btn-s btn-d" onclick="removeSuspect(${S.activeSuspect})">🗑 ลบผู้ต้องหาที่ ${S.activeSuspect+1}</button></div>` : ''}

    <div class="fg c2">
      <div class="fgroup">
        <label class="fl">คำนำหน้า</label>
        <select data-f="suspects.${S.activeSuspect}.title" style="padding:9px 12px">
          ${['นาย','นาง','นางสาว','ด.ช.','ด.ญ.','อื่นๆ'].map(t => `<option ${sus.title===t?'selected':''}>${t}</option>`).join('')}
        </select>
      </div>
      <div></div>
      <div class="fgroup"><label class="fl">ชื่อ <span class="req">*</span></label><input type="text" data-f="suspects.${S.activeSuspect}.firstName" value="${esc(sus.firstName)}" placeholder="ชื่อ"></div>
      <div class="fgroup"><label class="fl">นามสกุล <span class="req">*</span></label><input type="text" data-f="suspects.${S.activeSuspect}.lastName" value="${esc(sus.lastName)}" placeholder="นามสกุล"></div>
      <div class="fgroup"><label class="fl">อายุ</label><input type="number" data-f="suspects.${S.activeSuspect}.age" value="${sus.age}" placeholder="ปี"></div>
      <div class="fgroup"><label class="fl">วันเกิด</label><input type="date" data-f="suspects.${S.activeSuspect}.dob" value="${sus.dob}"></div>
      <div class="fgroup"><label class="fl">เลขบัตรประชาชน</label><input type="text" data-f="suspects.${S.activeSuspect}.idCard" value="${esc(sus.idCard)}" placeholder="x-xxxx-xxxxx-xx-x"></div>
      <div class="fgroup"><label class="fl">หนังสือเดินทาง</label><input type="text" data-f="suspects.${S.activeSuspect}.passport" value="${esc(sus.passport)}" placeholder="(ถ้ามี)"></div>
      <div class="fgroup"><label class="fl">โทรศัพท์</label><input type="tel" data-f="suspects.${S.activeSuspect}.phone" value="${esc(sus.phone)}"></div>
      <div class="fgroup"><label class="fl">ที่อยู่ตามบัตร ปชช.</label><input type="text" data-f="suspects.${S.activeSuspect}.addressId" value="${esc(sus.addressId)}" placeholder="เลขที่..."></div>
      <div class="fgroup full"><label class="fl">ที่อยู่ (ตำบล/อำเภอ/จังหวัด)</label>
        <div class="fg c3" style="margin-top:4px">
          <input type="text" data-f="suspects.${S.activeSuspect}.subDistrict" value="${esc(sus.subDistrict)}" placeholder="แขวง/ตำบล">
          <input type="text" data-f="suspects.${S.activeSuspect}.district" value="${esc(sus.district)}" placeholder="เขต/อำเภอ">
          <input type="text" data-f="suspects.${S.activeSuspect}.province" value="${esc(sus.province)}" placeholder="จังหวัด">
        </div>
      </div>

// ===== STEP 6: SIGNATURE =====
function buildSigList() {
  const o = S.officer;
  const oName = `${o.rank} ${o.firstName} ${o.lastName}`;
  const list = [];
  // 1. Officer (ผู้จับกุม/บันทึก) — ไม่รวมผู้อำนวยการ
  list.push({ key:'officer', label:'ผู้จับกุม/บันทึก/อ่าน', name:oName, group:'เจ้าหน้าที่ผู้จับกุม', icon:'👮' });
  // 2. Leaders (นำโดย)
  S.leaders.forEach((l,i) => {
    if(l.rankName) list.push({ key:`leader_${i}`, label:'ผู้นำจับกุม', name:l.rankName, group:'นำโดย', icon:'🎖️' });
  });
  // 3. Joint team
  S.jointUnits.forEach((u,ui) => {
    u.officers.forEach((of,oi) => {
      if(of.rankName) list.push({ key:`joint_${ui}_${oi}`, label:'ผู้ร่วมจับกุม', name:of.rankName, group:u.unitName||'หน่วยร่วม', icon:'🤝' });
    });
  });
  // 4. Suspects
  S.suspects.forEach((sus,i) => {
    const fn = `${sus.title}${sus.firstName||'ผู้ต้องหา '+(i+1)} ${sus.lastName}`;
    list.push({ key:`suspect_${i}`, label:'ผู้ต้องหา', name:fn, group:'ผู้ต้องหา', icon:'👤' });
  });
  return list;
}

// ========== HELPERS ==========
function esc(s) { return (s||'').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }
function thDate(d) { if(!d) return ''; const x=new Date(d); const m=['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.']; return `${x.getDate()} ${m[x.getMonth()]} ${x.getFullYear()+543}`; }
function getOT(s) { const m={caught_in_act:'ความผิดซึ่งหน้า',warrant:`หมายจับ ${s.s23_warrantNo||'...'}`,order:`คำสั่ง ${s.s23_orderDetail||'...'}`,other:s.s23_otherDetail||'อื่นๆ'}; return m[s.s23_orderType]||'—'; }

function updS(path, val) {
  const p = path.split('.');
  let o = S;
  for (let i=0;i<p.length-1;i++) o = o[p[i]];
  o[p[p.length-1]] = val;
}

function bindInputs() {
  document.querySelectorAll('[data-f]').forEach(el => {
    el.addEventListener('input', e => updS(e.target.dataset.f, e.target.value));
    el.addEventListener('change', e => updS(e.target.dataset.f, e.target.value));
  });
}

function go(n) { saveAll(); S.step=n; R(); window.scrollTo({top:0,behavior:'smooth'}); }
function next() { saveAll(); if(S.step<STEPS.length-1){S.step++;R();window.scrollTo({top:0,behavior:'smooth'});} }
function prev() { saveAll(); if(S.step>0){S.step--;R();window.scrollTo({top:0,behavior:'smooth'});} }
function saveAll() { document.querySelectorAll('[data-f]').forEach(el => updS(el.dataset.f, el.value)); }

function addSuspect() { S.suspects.push(newSuspect()); S.activeSuspect=S.suspects.length-1; R(); }
function removeSuspect(i) { if(S.suspects.length<=1) return; S.suspects.splice(i,1); S.activeSuspect=Math.min(S.activeSuspect,S.suspects.length-1); R(); }

function addEvidence() { S.evidence.push({name:'',qty:'',unit:'ชิ้น',location:''}); R(); }
function removeEvidence(i) { if(S.evidence.length<=1) return; S.evidence.splice(i,1); R(); }

// Photo
function upPhoto(input, idx, type) {
  const f = input.files[0]; if(!f) return;
  const r = new FileReader();
  r.onload = e => {
    if(type==='suspect') S.suspects[idx].photo=e.target.result;
    else if(type==='photoFront') { S.suspects[idx].photoFront=e.target.result; if(!S.suspects[idx].photo) S.suspects[idx].photo=e.target.result; }
    else if(type==='photoBack')  S.suspects[idx].photoBack=e.target.result;
    else if(type==='photoLeft')  S.suspects[idx].photoLeft=e.target.result;
    else if(type==='photoRight') S.suspects[idx].photoRight=e.target.result;
    else if(type==='scene') S.scenePhoto=e.target.result;
    else if(type==='evidence') S.evidencePhoto=e.target.result;
    R();
  };
  r.readAsDataURL(f);
}
function capCam(id) { const el=document.getElementById(id); el.setAttribute('capture','environment'); el.click(); setTimeout(()=>el.removeAttribute('capture'),100); }

// Signature — key-based (S.signatures[key])
let sigCv, sigCx, sigD=false;
function initSig() {
  sigCv=document.getElementById('sig-cv'); if(!sigCv) return;
  sigCx=sigCv.getContext('2d');
  const key=S.sigActiveKey;
  if(S.signatures[key]){const img=new Image();img.onload=()=>sigCx.drawImage(img,0,0);img.src=S.signatures[key];}
  sigCv.onmousedown=e=>{sigD=true;sigCx.beginPath();sigCx.moveTo(e.offsetX,e.offsetY);sigCx.strokeStyle='#111';sigCx.lineWidth=2;sigCx.lineCap='round';};
  sigCv.onmousemove=e=>{if(!sigD)return;sigCx.lineTo(e.offsetX,e.offsetY);sigCx.stroke();};
  sigCv.onmouseup=()=>{sigD=false;S.signatures[S.sigActiveKey]=sigCv.toDataURL();};
  sigCv.ontouchstart=e=>{e.preventDefault();const r=sigCv.getBoundingClientRect();const p={offsetX:e.touches[0].clientX-r.left,offsetY:e.touches[0].clientY-r.top};sigD=true;sigCx.beginPath();sigCx.moveTo(p.offsetX,p.offsetY);sigCx.strokeStyle='#111';sigCx.lineWidth=2;sigCx.lineCap='round';};
  sigCv.ontouchmove=e=>{e.preventDefault();if(!sigD)return;const r=sigCv.getBoundingClientRect();sigCx.lineTo(e.touches[0].clientX-r.left,e.touches[0].clientY-r.top);sigCx.stroke();};
  sigCv.ontouchend=()=>{sigD=false;S.signatures[S.sigActiveKey]=sigCv.toDataURL();};
}
function clearSig() { delete S.signatures[S.sigActiveKey]; R(); }

// Preview & Export
function showPv(type, idx) { S.showModal=type; S.modalSuspectIdx=idx||0; saveAll(); R(); }

// ============== HELPERS for official-format documents ==============
function _v(x, fallback) {
  // wrap value in dotted underline span
  const val = (x===null||x===undefined||x==='') ? '' : x;
  return `<span class="d">${val||'\u00a0'.repeat(6)}</span>`;
}
function _vlong(x) {
  const val = (x===null||x===undefined||x==='') ? '\u00a0'.repeat(20) : x;
  return `<span class="d lg">${val}</span>`;
}
function _vmd(x) {
  const val = (x===null||x===undefined||x==='') ? '\u00a0'.repeat(12) : x;
  return `<span class="d md">${val}</span>`;
}
function _photoCell(src, label) {
  if (src) {
    return `<div class="photo-cell"><img src="${src}" alt="${label}"><div class="ph-lb">${label}</div></div>`;
  }
  return `<div class="photo-cell empty"><span class="ph-lb-empty">${label}</span><span class="ph-no">[ภาพถ่าย]</span></div>`;
}
function _sigCell(s) {
  const hasSig = S.signatures[s.key];
  const img = (hasSig && S.sigMode==='electronic') ? `<img src="${S.signatures[s.key]}" class="sig-img">` : '';
  return `<div class="attach-sig-box">
    ${img}
    <div class="sig-line"></div>
    <div>ลงชื่อ</div>
    <div>( ${s.name||'..........................................'} )</div>
    <div class="sig-role">${s.label}</div>
  </div>`;
}

    const suspectSigHTML = suspectSigs.map(s=>`
      <div style="text-align:center;margin:8px 0">
        (ลงชื่อ)<span class="d lg">${S.signatures[s.key] && S.sigMode==='electronic'?`<img src="${S.signatures[s.key]}" style="height:30px">`:''}</span>${s.label}/ได้รับสำเนาบันทึกการจับไว้แล้ว<br>
        (${_vmd(s.name)})
      </div>
    `).join('');

    const officerSigHTML = `<div class="sig-grid">
      ${officerSigs.map(s=>{
        const hasSig = S.signatures[s.key] && S.sigMode==='electronic';
        return `<div class="sig-item">
          ${hasSig?`<img src="${S.signatures[s.key]}" class="sig-img-inline">`:'<div class="sig-line-2"></div>'}
          ${s.name||'..........................................'}<br>
          <span style="font-size:12px">${s.label}</span>
        </div>`;
      }).join('')}
    </div>`;

    const page2 = `
      <div class="page">
        <p class="indent">เจ้าหน้าที่ตำรวจชุดจับกุมได้เดินทางไปยังสถานที่ดังกล่าวข้างต้น เมื่อไปถึงได้พบ ผู้ต้องหาตามรายชื่อข้างต้น เจ้าหน้าที่ตำรวจจึงได้แสดงตัวและแสดงบัตรประจำตัวให้ผู้ต้องหาทราบและเข้าใจดีแล้ว ผลการตรวจสอบพบของกลางตามรายการดังกล่าวข้างต้น เจ้าหน้าที่ตำรวจจึงได้แจ้งให้ผู้ต้องหาทราบว่าการกระทำดังกล่าวเป็นการกระทำความผิดต่อกฎหมาย</p>

        <p class="indent">และแจ้งข้อกล่าวหาให้ทราบว่ากระทำความผิดฐาน "${_vlong(inc.accusation)}" และได้แจ้งสิทธิ์ของผู้ต้องหา ตาม ป.วิอาญา มาตรา ๗/๑ ให้ผู้ต้องหาทราบ ณ สถานที่ตรวจค้น/จับกุม ดังนี้</p>

        <div class="rights-list">${rightsList}</div>

        <div style="margin-top:8px">
          <p class="indent">ขณะจับกุม ผู้ถูกจับได้รับทราบข้อกล่าวหาและสิทธิ์ของผู้ถูกจับโดยเข้าใจดีตลอดแล้ว และให้การ ${statementsHTML}</p>

        <p class="indent">เจ้าหน้าที่ตำรวจชุดจับกุมจึงได้ร่วมกันทำการจับกุม พร้อมตรวจยึดของกลางตามรายการดังกล่าวข้างต้นเป็นของกลาง นำส่งพนักงานสอบสวน${_vmd(S.detentionPlace||o.unit)}เพื่อดำเนินคดีตามกฎหมายต่อไป</p>

          <strong>เมื่อวันที่</strong> ${_vmd(ad)}เวลาประมาณ${_v(at)}น.
        </div>

        <p class="indent" style="margin-top:8px"><strong>อนึ่ง</strong> ${S.anungText}</p>

        <p class="indent">ได้อ่านบันทึกนี้ให้ผู้ต้องหาฟังและได้อ่านเองแล้ว รับว่าถูกต้อง จึงให้ลงลายมือชื่อไว้เป็นหลักฐาน</p>

        ${suspectSigHTML}

    `;

    body = page1 + page2;
  }
  else if (type==='sec22') {
    const sus = S.suspects[idx];

    const fn = `${sus.title}${sus.firstName} ${sus.lastName}`;
    title = `แบบ ม.22 — ${fn}`;

    const page1 = `
      <div class="page">
        <h1>แบบแจ้งข้อมูล เรื่อง การจับและควบคุมตามมาตรา ๒๒ วรรคสอง</h1>
        <div class="stars">******************************************************</div>
        <p class="indent">รายการข้อมูลในการแจ้งการจับและควบคุมไปยังศูนย์รับแจ้งโดยทันทีที่มีข้อมูล ดังต่อไปนี้</p>

        <div class="section">
          <span class="section-num">(๑)</span> ชื่อ/สกุล${_vlong(fn)}หมายเลขประจำตัวประชาชนหรือ<br>
          หมายเลขเอกสารอื่นที่ใช้ระบุตัวตน${_vlong(sus.idCard||sus.passport)}<br>
          ที่อยู่${_vlong(sus.addressId)} แขวง/ต.${_vmd(sus.subDistrict)} เขต/อ.${_vmd(sus.district)} จ.${_vmd(sus.province)}<br>
          หมายเลขโทรศัพท์${_vmd(sus.phone)} และอายุ${_v(sus.age)}ปี
        </div>

        <div class="section">
          <span class="section-num">(๒)</span> วัน เวลา และสถานที่ที่ทำการจับและควบคุม<br>
          วันที่${_vmd(ad)}เวลา${_v(at)}น. สถานที่จับและควบคุม${_vlong(inc.location)}<br>
          ตำบล/แขวง${_vmd(inc.subDistrict)} อำเภอ/เขต${_vmd(inc.district)} จังหวัด${_vmd(inc.province)}
        </div>

        <div class="section">
          <span class="section-num">(๓)</span> พฤติการณ์ในการจับและควบคุมบุคคลดังกล่าวโดยย่อ<br>
          <p class="narrative">${(inc.narrative||'').replace(/\n/g,'<br>') || '<span style="color:#999">[ยังไม่ได้กรอกพฤติการณ์]</span>'}</p>
        </div>

        <div class="section">
          <span class="section-num">(๔)</span> สถานที่ที่จะนำตัวบุคคลดังกล่าวไปควบคุมไว้<br>
          สถานที่ควบคุมตัว(สน./สภ./กก.)${_vlong(S.detentionPlace)}<br>
          อำเภอ/เขต${_vmd(S.detentionDistrict)} จังหวัด${_vmd(S.detentionProvince)}
        </div>

        <div class="section">
          <span class="section-num">(๕)</span> ภาพถ่ายผู้ถูกจับและควบคุมตาม (๑) (เป็นภาพแนบท้าย)
        </div>

        <div class="section">
          <span class="section-num">(๖)</span> ชื่อ สกุล และตำแหน่งของเจ้าหน้าที่ของรัฐผู้รับผิดชอบที่ทำการจับและควบคุมตามมาตรา ๒๒ รวมทั้งหมายเลขโทรศัพท์ที่สามารถติดต่อได้<br>
          ยศ/ชื่อ/นามสกุล${_vlong(oName)}<br>
          ตำแหน่ง/สังกัด${_vlong(o.position+' '+o.unit)}<br>
          หมายเลขโทรศัพท์ที่สามารถติดต่อได้${_vmd(o.phone)}
        </div>

        <div class="section">
          <span class="section-num">(๗)</span> เหตุสุดวิสัยในกรณีที่ไม่สามารถบันทึกภาพและเสียงได้ในขณะจับและควบคุม (ถ้ามี)${_vlong(sus.s23_forceReason)}
        </div>

        <div class="sig-area">
          <div>ลงชื่อ <span class="sig-line"></span>ผู้แจ้งซึ่งทำการจับและควบคุม</div>
          <div>(เจ้าหน้าที่ของรัฐผู้รับผิดชอบตามข้อ ๖)</div>
        </div>

        <div class="note">
          <strong>*****หมายเหตุ :</strong> ให้ใช้แบบแจ้งข้อมูลนี้ เฉพาะกรณีระบบรับแจ้งการควบคุมตัวเกิดข้อขัดข้อง/หรือแจ้งพนักงานอัยการเท่านั้น
        </div>
      </div>
    `;

    // Attachment page with photos
    const attachSigs = [
      sigList.find(s=>s.key==='officer'),
      sigList.find(s=>s.key===`suspect_${idx}`),
      {key:'witness',label:'พยาน(ถ้ามี)',name:''}
    ].filter(Boolean);

    const page2 = `
      <div class="page attach-page">
        <div class="attach-title">
          <div class="ext">(เพิ่มเติม)</div>
          <h2>แบบแจ้งเรื่องการควบคุมตัวตามมาตรา ๒๒ วรรคสอง</h2>
          <div class="sub">ตามข้อ (๕) ภาพถ่ายผู้ถูกจับและการควบคุม ตามข้อ (๑) (ภาพแนบท้าย)</div>

        <div class="photo-grid-large">

  else if (type==='sec23') {
    const sus = S.suspects[idx];
    if (!sus) return {title:'',body:''};
    const fn = `${sus.title}${sus.firstName} ${sus.lastName}`;
    title = `แบบ ม.23 (ปท.1) — ${fn}`;

    // Section 3 - order type checkboxes
    const ot = sus.s23_orderType;
    const cb = (v) => ot===v ? '<span class="cb checked"></span>' : '<span class="cb"></span>';

    const page1 = `
      <div class="page">
        <div class="page-header">ปท. ๑ หน้าที่ ๑</div>
        <h1 style="font-size:15px">แบบบันทึกข้อมูลเกี่ยวกับผู้ถูกควบคุมตัวตามมาตรา ๒๓ แห่งพระราชบัญญัติป้องกัน<br>และปราบปรามการทรมานและการกระทำให้บุคคลสูญหาย พ.ศ. ๒๕๖๕</h1>

        <table class="form-grid">
          <tr>
            <td>
              <div><span class="section-num">๑</span> ข้อมูลอัตลักษณ์เกี่ยวกับผู้ถูกควบคุมตัว</div>
              ชื่อ${_vmd(sus.title+sus.firstName)}นามสกุล${_vmd(sus.lastName)}<br>
              เลขบัตรประชาชน${_vlong(sus.idCard)}<br>
              หนังสือเดินทาง${_vlong(sus.passport)}<br>
              ที่อยู่${_vlong(sus.addressId)}<br>
              ${_vlong((sus.subDistrict||'')+' '+(sus.district||'')+' '+(sus.province||''))}<br>
              ตำหนิรูปพรรณที่เห็นเด่นชัด<br>
              ${_vlong(sus.appearance)}<br>
              รูปถ่ายของผู้ถูกควบคุม(ปรากฏตามที่แนบท้ายบันทึก หน้าที่ ๒)
            </td>
            <td>
              <div><span class="section-num">๓</span> คำสั่งที่ให้มีการควบคุมตัว และเหตุแห่งการออกคำสั่งนั้น</div>
              ${cb('caught_in_act')} ความผิดซึ่งหน้าฐาน${_vmd(inc.accusation)}<br><br>
              ${cb('warrant')} ตามหมายจับเลขที่${_vmd(sus.s23_warrantNo)}<br>
              ศาลผู้ออกหมาย${_vmd(sus.s23_courtName)}<br><br>
              ${cb('order')} ตามคำสั่ง${_vmd(sus.s23_orderDetail)}<br><br>
              ${cb('other')} กรณีอื่น ๆ${_vmd(sus.s23_otherDetail)}
            </td>
          </tr>
          <tr>
            <td>
              <div><span class="section-num">๒</span> ข้อมูลเกี่ยวกับวันเวลา สถานที่ควบคุมตัว และเจ้าหน้าที่ผู้ควบคุมตัว</div>
              วันที่ถูกควบคุมตัว${_vmd(ad)}เวลา${_v(at)}น.<br>
              สถานที่ที่ถูกควบคุมตัว${_vlong(inc.location)}<br>
              ตำบล/แขวง${_vmd(inc.subDistrict)} อำเภอ/เขต${_vmd(inc.district)}<br>
              จังหวัด${_vmd(inc.province)}<br><br>
              <u>เจ้าหน้าที่ผู้ทำการควบคุมตัว</u><br>
              ชื่อ${_vmd(o.firstName)}นามสกุล${_vmd(o.lastName)}<br>
              ตำแหน่ง${_vlong(o.position+' '+o.unit)}<br>
              หมายเลขติดต่อ${_vmd(o.phone)}<br><br>
              <u>สถานที่ปลายทางที่รับตัว</u><br>
              ${_vlong(S.detentionPlace)}<br>
              ตำบล/แขวง${_vmd(S.detentionDistrict)}<br>
              จังหวัด${_vmd(S.detentionProvince)}
            </td>
            <td>
              <div><span class="section-num">๔</span> เจ้าหน้าที่ของรัฐผู้ออกคำสั่งให้ควบคุมตัว</div>
              ชื่อ-นามสกุล${_vlong(sus.s23_orderOfficerName)}<br>
              ตำแหน่ง${_vlong(sus.s23_orderOfficerPosition)}

              <div style="margin-top:12px"><span class="section-num">๕</span> วัน/เวลา/สถานที่ของการปล่อยตัว และผู้มารับตัว/หรือส่งมอบตัว</div>

              สถานที่${_vlong(sus.s23_releasePlace)}<br>
              ผู้มารับตัว ชื่อ${_vmd(sus.s23_receiverName)}<br>
              หมายเลขติดต่อ${_vmd(sus.s23_receiverPhone)}

              <div style="margin-top:12px"><span class="section-num">๖</span> ข้อมูลเกี่ยวกับสภาพร่างกายและจิตใจของผู้ถูกควบคุมตัว</div>
              ก่อนถูกควบคุมตัว${_vlong(sus.s23_conditionBefore)}<br>
              ก่อนปล่อย/ส่งตัว${_vlong(sus.s23_conditionAfter)}
            </td>
          </tr>
          <tr>
            <td colspan="2">
              <div><span class="section-num">๗</span> ข้อมูลอื่น ๆ ที่คณะกรรมการกำหนด</div>
              ${_vlong('')}
            </td>
          </tr>
        </table>
      </div>
    `;

    const attachSigs = [
      sigList.find(s=>s.key==='officer'),
      sigList.find(s=>s.key===`suspect_${idx}`),
      {key:'witness',label:'พยาน(ถ้ามี)',name:''}
    ].filter(Boolean);

    const page2 = `
      <div class="page">
        <div class="page-header">ปท.๑ หน้าที่ ๒<br><span style="font-size:12px">มีหน้าต่อเป็นบันทึกแนบท้ายเพิ่มเติม</span></div>
        <div class="page2-title">บันทึกแนบท้ายเพิ่มเติม</div>

        <div class="section">
          <span class="section-num">๘.</span> เหตุสุดวิสัยที่ไม่สามารถบันทึกภาพและเสียงตามมาตรา ๒๒ วรรคหนึ่งได้ ${_vlong(sus.s23_forceReason)}
        </div>

        <div class="section">
          <span class="section-num">๙.</span> บันทึกอื่น ๆ เพิ่มเติม (ถ้ามี) ${_vlong(sus.s23_additionalNotes)}
        </div>

        <div class="photo-grid-large">
          ${_photoCell(sus.photoFront||sus.photo,'หน้าตรง')}
          ${_photoCell(sus.photoBack,'หันหลัง')}
          ${_photoCell(sus.photoLeft,'หันข้างซ้าย')}
          ${_photoCell(sus.photoRight,'หันข้างขวา')}
        </div>

        <div class="attach-sig-row">
          ${attachSigs.map(s=>_sigCell(s)).join('')}
        </div>

        <div class="note">
          <strong>***หมายเหตุ :</strong><br>
          ๑. ในกรณีข้อมูลตามรายการ ๑ – ๗ มีจำนวนมากให้ทำเป็นบันทึกแนบท้ายเพิ่มเติมในข้อ ๙<br>
          ๒. ให้เจ้าหน้าที่ของรัฐซึ่งทำการจับและควบคุม ส่งตัวผู้ถูกควบคุมตัวให้กับผู้รับมอบตัว พร้อมสำเนา ปท.๑ และเอกสารประกอบ (ถ้ามี) สำหรับนำบันทึกฉบับจริงเก็บในสารบบของหน่วยงาน<br>
          ๓. ให้ผู้รับมอบตัวจัดทำ ปท.๑ ในส่วนของตน โดยมีสำเนา ปท.๑ ของผู้ควบคุมคนก่อนเป็นเอกสารแนบท้าย<br>
          ๔. ภาพถ่ายของผู้ถูกควบคุมตามข้อ ๑ ให้ทำเป็นเอกสารภาพถ่ายแนบท้าย ปท.๑ อย่างน้อยต้องเห็นเนื้อตัวร่างกายตามสภาพภายนอกขณะถูกควบคุมหรือขณะรับมอบตัว โดยไม่ต้องถอดเสื้อผ้า
        </div>
      </div>
    `;

    body = page1 + page2;
  }

  return {title, body};
}

function getDocCSS() {
  // CSS shared by Print PDF window AND Word export
  return `
      *{margin:0;padding:0;box-sizing:border-box}
      body{
        font-family:'TH SarabunPSK','Sarabun','Tahoma',sans-serif;
        font-size:16pt; line-height:1.45; color:#000; background:#dadada;
      }
      .page{
        width:210mm; min-height:297mm;
        margin:14px auto; padding:18mm 20mm 16mm 22mm;
        background:#fff; box-shadow:0 2px 10px rgba(0,0,0,.18);
        position:relative; page-break-after:always;
      }
      .page:last-child{page-break-after:auto}
      @media print{
        html,body{background:#fff}
        .page{margin:0;padding:18mm 20mm 16mm 22mm;box-shadow:none;width:210mm;min-height:297mm}
        @page{margin:0;size:A4 portrait}
      }

      h1{font-size:20pt;font-weight:700;text-align:center;margin-bottom:6pt}
      h2{font-size:18pt;font-weight:700;text-align:center;margin-bottom:6pt}
      h3{font-size:16pt;font-weight:700;margin-bottom:4pt}
      strong{font-weight:700}
      img{max-width:100%}

      .stars{text-align:center;font-size:14pt;letter-spacing:1px;margin-bottom:6pt}
      .indent{text-indent:2.5em;margin-bottom:6pt;text-align:justify}
      .narrative{text-indent:2.5em;white-space:pre-wrap;line-height:1.5;text-align:justify}
      .section{margin-bottom:6pt}
      .section-num{font-weight:700}
      .section-title{font-weight:700;margin-top:4pt;margin-bottom:2pt}
      .clearfix::after{content:'';display:block;clear:both}
      .empty{color:#999}

      /* Dotted underline value field */
      .d{
        border-bottom:1px dotted #444;
        display:inline-block;
        min-width:90px; padding:0 4px;
        text-align:center;
        color:#0000cc; font-weight:600;
      }
      .d:empty::after{content:'\\00a0'}
      .d.md{min-width:160px}
      .d.lg{min-width:240px}
      .d.xlg{min-width:340px}
      .d.full{min-width:calc(100% - 2em);text-align:left}

      /* Header right block */
      .header-fields{
        float:right; text-align:right; font-size:14pt;
        margin-bottom:8pt;
      }

      /* Rights list */
      .rights-list{padding-left:2em;margin:6pt 0}
      .rights-list>div{margin-bottom:3pt;text-indent:-1.2em;padding-left:1.2em}

      /* Evidence list */
      .ev-list{margin:4pt 0}
      .ev-row{margin-bottom:3pt}

      /* Signature grid (officer signatures - 3 cols) */
      .sig-grid{
        display:grid;
        grid-template-columns:1fr 1fr 1fr;
        gap:14pt 8pt;
        margin-top:18pt;
      }
      .sig-item{text-align:center;font-size:14pt}
      .sig-line-2{
        display:inline-block; width:92%;
        border-bottom:1px dotted #444;
        margin-bottom:2pt; height:24pt;
      }
      .sig-img-inline{height:32pt;display:block;margin:0 auto 2pt}
      .sig-role{font-size:13pt}

      /* Bottom signature area */
      .sig-area{margin-top:24pt;text-align:center}
      .sig-area .sig-line{
        display:inline-block; width:280px;
        border-bottom:1px dotted #444; margin-bottom:2pt;
      }
      .sig-line{
        display:inline-block; width:220px;
        border-bottom:1px dotted #444; margin-bottom:2pt;
      }
      .sig-img{max-height:36pt;vertical-align:middle}

      /* Note (footer) */
      .note{
        margin-top:18pt; font-size:13pt;
        border-top:1px solid #999; padding-top:6pt;
      }

      /* Checkbox for sec23 */
      .cb{
        display:inline-block; width:13px; height:13px;
        border:1px solid #333; vertical-align:middle;
        margin-right:4px; position:relative;
      }
      .cb.checked::after{
        content:'\\2713'; position:absolute;
        left:1px; top:-6px; font-size:15pt; font-weight:700;
        color:#0000cc;
      }

      /* Section 23 form-grid table */
      .form-grid{
        width:100%; border-collapse:collapse;
        margin-top:6pt; font-size:14pt;
      }
      .form-grid td{
        border:1px solid #000; padding:8pt 10pt;
        vertical-align:top; line-height:1.5;
      }

      /* Page header */
      .page-header{
        position:absolute; top:10mm; right:20mm;
        font-size:13pt; text-align:right;
      }
      .page2-title{
        text-align:center; font-weight:700;
        font-size:16pt; margin:8pt 0;
      }

      /* Attachment page (photos) */
      .attach-title{text-align:center;margin-bottom:10pt}
      .attach-title .ext{font-size:16pt;font-weight:700}
      .attach-title h2{font-size:18pt;font-weight:700;margin-top:4pt}
      .attach-title .sub{font-size:14pt;margin-top:4pt}

      .photo-grid-large{
        display:grid;
        grid-template-columns:1fr 1fr;
        grid-template-rows:1fr 1fr;
        gap:8px;
        width:100%; height:180mm;
        margin:10pt 0;
      }
      .photo-cell{
        border:1px solid #333;
        display:flex; align-items:center; justify-content:center;
        flex-direction:column;
        background:#f5f5f5; color:#777; font-size:14pt;
        overflow:hidden; position:relative;
      }
      .photo-cell img{
        max-width:100%; max-height:100%; object-fit:contain;
      }
      .photo-cell .ph-lb{
        position:absolute; top:6px; left:8px;
        background:rgba(255,255,255,.9); padding:2px 8px;
        font-weight:700; color:#333; font-size:12pt;
        border:1px solid #999;
      }
      .photo-cell .ph-lb-empty{
        font-weight:700; color:#333;
        font-size:16pt; margin-bottom:4pt;
      }
      .photo-cell .ph-no{font-size:12pt;color:#888}

      /* 3-column signature row for attachment page */
      .attach-sig-row{
        display:grid;
        grid-template-columns:1fr 1fr 1fr;
        gap:10px; margin-top:12pt;
      }
      .attach-sig-box{
        border:1px solid #333; padding:8pt 10pt;
        text-align:center; font-size:13pt; min-height:80pt;
      }
      .attach-sig-box .sig-line{
        display:inline-block; width:80%;
        border-bottom:1px dotted #444;
        margin:6pt 0 2pt; height:22pt;
      }
  `;
}

function openPrintWindow(title, body) {
  const w = window.open('','_blank','width=900,height=1000');
  w.document.write(`<!DOCTYPE html><html lang="th"><head><meta charset="UTF-8">
    <title>${title}</title>
    <style>${getDocCSS()}</style>
  </head><body>${body}
    <script>window.onload=function(){setTimeout(function(){window.print();},500);}<\/script>
  </body></html>`);
  w.document.close();
}

function exportPDF(type, idx) {
  const doc = buildDocHTML(type, idx);
  openPrintWindow(doc.title, doc.body);
}

// === Word (.doc) export ===
// Generates an HTML file with Word XML headers, downloaded with .doc extension.
// Microsoft Word opens these natively, preserving most styling and pagination.
function exportDoc(type, idx) {
  const doc = buildDocHTML(type, idx);
  downloadDoc(doc.title, doc.body);
}

function downloadDoc(title, body) {
  // Word HTML format with Office namespaces & WordSection page setup
  const wordCSS = getDocCSS() + `
    /* Word-specific page setup */
    @page WordSection1 {
      size: 21cm 29.7cm;
      margin: 1.8cm 2cm 1.6cm 2.2cm;
      mso-page-orientation: portrait;
    }
    div.WordSection1 { page: WordSection1; }
    .page { page-break-after: always; box-shadow: none; margin: 0; padding: 0; width: auto; min-height: auto; background: #fff; }
    .page:last-child { page-break-after: auto; }
    body { background: #fff; }
  `;
  const html = `<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:w="urn:schemas-microsoft-com:office:word" xmlns="http://www.w3.org/TR/REC-html40">
<head>
<meta charset="utf-8">
<title>${title}</title>
<!--[if gte mso 9]><xml>
<w:WordDocument><w:View>Print</w:View><w:Zoom>100</w:Zoom><w:DoNotOptimizeForBrowser/></w:WordDocument>
</xml><![endif]-->
<style>${wordCSS}</style>
</head>
<body><div class="WordSection1">${body}</div></body>
</html>`;
  // BOM ensures Word reads UTF-8 (Thai chars) correctly
  const blob = new Blob(['\ufeff', html], { type: 'application/msword' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = (title || 'document').replace(/[\\/:*?"<>|]/g,'_') + '.doc';
  document.body.appendChild(a);
  a.click();
  setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 200);
}

function exportAll() {
  // Export arrest record
  const arrestDoc = buildDocHTML('arrest', 0);
  openPrintWindow(arrestDoc.title, arrestDoc.body);
  // Export per-suspect docs with slight delay so windows don't overlap
  S.suspects.forEach((s, i) => {
    setTimeout(() => {
      const s22 = buildDocHTML('sec22', i);
      openPrintWindow(s22.title, s22.body);
    }, (i*2+1)*600);
    setTimeout(() => {
      const s23 = buildDocHTML('sec23', i);
      openPrintWindow(s23.title, s23.body);
    }, (i*2+2)*600);
  });
}
